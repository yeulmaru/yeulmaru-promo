// f-time input wheel 이벤트 - 10분 단위 +/-
document.addEventListener('DOMContentLoaded',function(){
  // 모바일 nav — 외부 클릭/ESC 시 자동 닫힘
  document.addEventListener('click',function(e){
    const c=document.getElementById('nav-menus');
    if(!c||!c.classList.contains('mobile-open'))return;
    if(e.target.closest('.hamburger')||e.target.closest('#nav-menus'))return;
    c.classList.remove('mobile-open');
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){
      const c=document.getElementById('nav-menus');
      if(c)c.classList.remove('mobile-open');
    }
  });
  var ft=document.getElementById('f-time');
  if(!ft)return;
  ft.addEventListener('wheel',function(e){
    e.preventDefault();
    var cur=ft.value||'10:00';
    var parts=cur.split(':');
    var h=parseInt(parts[0])||0,m=parseInt(parts[1])||0;
    var total=h*60+m;
    total+=(e.deltaY<0?10:-10);
    if(total<0)total+=24*60;
    if(total>=24*60)total-=24*60;
    var nh=Math.floor(total/60),nm=total%60;
    ft.value=String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
  },{passive:false});
});

var _typingId=0;
function _typeLoop(elId,text,speed){
  var el=document.getElementById(elId);if(!el)return;
  var chars=Array.from(text);
  var i=0,pause=0;_typingId++;var myId=_typingId;
  function tick(){
    if(_typingId!==myId)return;
    el=document.getElementById(elId);if(!el)return;
    if(pause>0){pause--;setTimeout(tick,16);return;}
    if(i<=chars.length){el.textContent=chars.slice(0,i).join('');i++;setTimeout(tick,speed);}
    else{pause=30;i=0;setTimeout(tick,16);}
  }
  setTimeout(tick,100);
}

// SharePoint Graph API 일관성 지연 회피용 - 변경 후 row 수 검증 + 자동 재시도
async function syncReload(expectedDelta){
  var before=records.length;
  await new Promise(function(r){setTimeout(r,500);});
  await loadData();
  if(expectedDelta===undefined)return;
  var expected=before+expectedDelta;
  for(var i=0;i<3;i++){
    if(records.length===expected)return;
    console.warn('[syncReload] count mismatch (attempt '+(i+1)+'), expected:',expected,'got:',records.length,'- retrying...');
    await new Promise(function(r){setTimeout(r,1000+i*500);});
    await loadData();
  }
  if(records.length!==expected){
    console.warn('[syncReload] final mismatch. SharePoint 일관성 안정화에 시간이 더 필요할 수 있음.');
  }
}

function excelToKey(v){if(!v)return'';if(typeof v==='number'){const d=new Date((v-25569)*86400000);return dk(d);}return String(v);}
function dk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isToday(d){return dk(d)===dk(new Date());}
function isPast(d){const t=new Date();t.setHours(0,0,0,0);const dd=new Date(d);dd.setHours(0,0,0,0);return dd<t;}
function getRecsForDate(d){return records.filter(r=>excelToKey(r['날짜'])===dk(d));}

function calDates(y,m){const first=new Date(y,m-1,1),dow=first.getDay(),offset=(dow-2+7)%7,start=new Date(y,m-1,1-offset),out=[];for(let w=0;w<6;w++){for(let d=0;d<6;d++){const dt=new Date(start);dt.setDate(dt.getDate()+w*7+d);out.push(dt);}}return out;}

function render(){document.getElementById('nav-month').textContent=currentMonth;document.getElementById('nav-year').textContent=currentYear;renderChips();renderCal();}

}
function clearFilters(){activeFilters=[];render();}

let _progScope='active';

    html+='<div class="pf-section" style="color:var(--accent)">공연</div>';

      html+='<label class="pf-row pf-e'+onCls+'"><input type="checkbox" onchange="onProgRowChange(this)" value="'+p.f.replace(/"/g,'&quot;')+'" '+checked+'><span class="pf-name">'+p.f+'</span><span class="pf-date">'+date+'</span></label>';

function onProgRowChange(input){
  input.closest('.pf-row').classList.toggle('on',input.checked);

}

function syncMasterCheckbox(){
  var inputs=document.querySelectorAll('#prog-list .pf-row input');
  var master=document.getElementById('pf-master');
  if(!master||inputs.length===0)return;
  var checked=Array.from(inputs).filter(function(i){return i.checked;}).length;
  if(checked===0){master.checked=false;master.indeterminate=false;}
  else if(checked===inputs.length){master.checked=true;master.indeterminate=false;}
  else{master.checked=false;master.indeterminate=true;}
}

// 모든 .c 셀의 dn을 c 직접 자식(absolute)으로 이동 + c-inner에 fade mask 적용
function setupCellOverlays(){
  const cells=document.querySelectorAll('.c.cell');
  cells.forEach(function(c){
    const inner=c.querySelector('.c-inner');
    if(!inner)return;
    const dn=inner.querySelector('.dn');
    if(!dn)return;
    // dn 분리
    c.appendChild(dn);
    dn.style.position='absolute';
    dn.style.top='7px';
    dn.style.left='8px';
    dn.style.right='14px';
    dn.style.zIndex='4';
    dn.style.pointerEvents='none';
    dn.style.background='transparent';
    dn.style.padding='0';
    dn.style.margin='0';
    // c-inner는 CSS에서 margin-top:18px (dn 아래부터 시작)
    // mask: 상단 6px fade (ev가 위로 스크롤 시 자연 fade)
    inner.style.paddingTop='6px';
    inner.style.webkitMaskImage='linear-gradient(to bottom, transparent 0, transparent 2px, black 8px, black 100%)';
    inner.style.maskImage='linear-gradient(to bottom, transparent 0, transparent 2px, black 8px, black 100%)';
  });
}

function clickDate(key){const[y,m,d]=key.split('-').map(Number);const dateObj=new Date(y,m-1,d);if(dateObj.getMonth()+1!==currentMonth)return;if(selected!==key)_panelProgramsOpen=false;selected=key;openPanel(dateObj,getRecsForDate(dateObj));render();}

// === 오늘 셀 일정 전광판 자동 스크롤 ===
let _todayMarqueeInterval=null;
function _smoothScrollTo(el,target,duration){
  const start=el.scrollTop;
  const dist=target-start;
  if(Math.abs(dist)<0.5){el.scrollTop=target;return;}
  const startTime=performance.now();
  function step(now){
    const elapsed=now-startTime;
    const t=Math.min(1,elapsed/duration);
    // easeInOutCubic
    const eased=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    el.scrollTop=start+dist*eased;
    if(t<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function startTodayMarquee(){
  if(_todayMarqueeInterval){clearInterval(_todayMarqueeInterval);_todayMarqueeInterval=null;}
  // 카드 stagger 끝난 후 측정·시작
  setTimeout(function(){
    const todayCell=document.querySelector('.c.today');
    if(!todayCell)return;
    const inner=todayCell.querySelector('.c-inner');
    if(!inner)return;
    const evs=inner.querySelectorAll('.ev');
    if(evs.length<2)return;
    // overflow 측정 (setupCellOverlays의 padding-top 반영 후)
    const overflow=inner.scrollHeight-inner.clientHeight;
    if(overflow<=2)return;
    // ev 한 줄 높이
    const evH=evs[0].getBoundingClientRect().height+2;
    if(evH<=0)return;
    let cur=0;
    inner.style.transition='opacity 0.4s ease';
    _todayMarqueeInterval=setInterval(function(){
      // 호버·드래그 중이면 일시정지
      if(todayCell.matches(':hover'))return;
      cur+=evH;
      if(cur>overflow+evH*0.3){
        // fade out → 즉시 처음으로 → fade in
        inner.style.opacity='0';
        setTimeout(function(){
          cur=0;
          inner.scrollTop=0;
          inner.style.opacity='1';
        },400);
      }else{
        _smoothScrollTo(inner,cur,1150);
      }
    },2150);
    // hover 시작 시 처음으로 리셋
    todayCell.addEventListener('mouseenter',function(){
      cur=0;
      inner.scrollTop=0;
    });
  },650);
}

// === 특별 일정 세로 슬라이드 (글로벌 interval) — 위로 사라지는 느낌 ===
let _spSlideIdx=0;
let _spSlideTimer=null;
function startSpecialSlide(){
  if(_spSlideTimer){clearInterval(_spSlideTimer);_spSlideTimer=null;}
  // 단일 글로벌 interval — 모든 셀의 .sp-track 동시 슬라이드 (성능 효율)
  _spSlideTimer=setInterval(function(){
    // 드래그 진행 중에는 슬라이드 건너뜀 (ghost 안정화)
    if(_drag&&_drag.sp)return;
    _spSlideIdx++;
    document.querySelectorAll('.sp-track').forEach(function(tr){
      const cnt=Number(tr.dataset.spCount)||1;
      if(cnt<=1)return;  // 항목 1개는 슬라이드 X
      const idx=_spSlideIdx%cnt;
      tr.style.transform='translateY('+(-idx*19)+'px)';
    });
  },2800);  // 2.8초마다 다음 항목
}

function populateProgramSelect(currentValue){
  var sel=document.getElementById('f-program');
  var perfs=PERFS.filter(function(p){return p.o===1;});
  var concerts=perfs.filter(function(p){return p.t==='c';});
  var exhibits=perfs.filter(function(p){return p.t==='e';});
  var html='<option value="">해당 없음</option>';
  if(concerts.length>0){
    html+='<optgroup label="공연">';
    concerts.forEach(function(p){html+='<option value="'+p.f.replace(/"/g,'&quot;')+'">'+p.f+'</option>';});
    html+='</optgroup>';
  }
  if(exhibits.length>0){
    html+='<optgroup label="전시">';
    exhibits.forEach(function(p){html+='<option value="'+p.f.replace(/"/g,'&quot;')+'">'+p.f+'</option>';});
    html+='</optgroup>';
  }
  // 수정 모드에서 현재 값이 종료된 프로그램이면 별도 옵션 추가
  if(currentValue&&!PERFS.some(function(p){return p.o===1&&p.f===currentValue;})){
    html+='<optgroup label="종료/기타"><option value="'+currentValue.replace(/"/g,'&quot;')+'" selected>'+currentValue+'</option></optgroup>';

  sel.innerHTML=html;
  if(currentValue)sel.value=currentValue;
}

function renderReadOnlyView(dateKey,rec,dateObj,dn){

    const[hh,mm]=hhmm.split(':').map(Number);

    const h12=hh%12||12;
    timeStr=`${ampm} ${h12}:${String(mm).padStart(2,'0')}`;
  }else if(typeof ts==='number'){
    const tm=Math.round((ts%1)*1440),hh=Math.floor(tm/60),mm=tm%60;
    const ampm=hh<12?'오전':'오후';
    const h12=hh%12||12;
    timeStr=`${ampm} ${h12}:${String(mm).padStart(2,'0')}`;
  }
  const mm2=String(rec['월']||'').padStart(2,'0');
  const dd2=String(rec['일']||'').padStart(2,'0');
  const dateTimeFull=`${mm2}-${dd2} (${dn}) ${timeStr}`;
  const status=rec['진행 상태']||'-';
  const memo=rec['비고']||'';
  const p1=rec['플랫폼 1']||'';
  const p2=rec['플랫폼 2']||'';
  const prog=rec['프로그램']||'';

function getWeekStartKey(dateStr){
  const[y,m,d]=dateStr.split('-').map(Number);
  const date=new Date(y,m-1,d);
  date.setDate(date.getDate()-date.getDay());
  return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
}
function navRec(dir,event){
  if(!editing||!editing.existing)return;
  const cur=editing.existing;
  const idx=_sortedRecs.findIndex(function(r){return r._rowIndex===cur._rowIndex;});
  if(idx<0)return;
  const newIdx=idx+dir;
  if(newIdx<0){showMiniTip(event,'더 이전의 콘텐츠가 없습니다');return;}
  if(newIdx>=_sortedRecs.length){showMiniTip(event,'다음 콘텐츠가 없습니다');return;}
  const newRec=_sortedRecs[newIdx];
  // 주 경계 체크
  const curKey=getRecDateKey(cur);
  const newKey=getRecDateKey(newRec);
  if(getWeekStartKey(curKey)!==getWeekStartKey(newKey)){
    const msg=dir>0?'다음 주 일정으로 넘어갈까요?':'저번 주 일정을 확인할까요?';
    showMiniConfirm(event,msg,function(){doNavToRec(newRec);});
    return;
  }
  doNavToRec(newRec);
}
function doNavToRec(newRec){
  const y=newRec['연도'],m=String(newRec['월']||'').padStart(2,'0'),d=String(newRec['일']||'').padStart(2,'0');
  const dateKey=y+'-'+m+'-'+d;
  const dateObj=new Date(Number(y),Number(m)-1,Number(d));
  const dn=DAY_NAMES[dateObj.getDay()];
  editing={dateKey:dateKey,existing:newRec};
  renderReadOnlyView(dateKey,newRec,dateObj,dn);
}

let _confirmResolve=null;
function showConfirm(msg, opts){
  // opts: {title, okText, cancelText, danger}
  opts=opts||{};
  return new Promise(function(resolve){
    _confirmResolve=resolve;
    document.getElementById('confirm-title').textContent=opts.title||'예울마루 알림';
    document.getElementById('confirm-msg').textContent=msg||'정말로 진행할까요?';
    const acts=document.getElementById('confirm-acts');
    const okCls=opts.danger?'danger':'yes';
    acts.innerHTML=
      '<button class="c-btn no" onclick="confirmResolve(false)">'+(opts.cancelText||'취소')+'</button>'+
      '<button class="c-btn '+okCls+'" onclick="confirmResolve(true)">'+(opts.okText||'확인')+'</button>';
    document.getElementById('confirm-modal').classList.add('show');
    _attachConfirmKeyHandler(false);
  });
}
function showAlert(msg, opts){
  opts=opts||{};
  return new Promise(function(resolve){
    _confirmResolve=function(){resolve(true);};
    document.getElementById('confirm-title').textContent=opts.title||'예울마루 알림';
    document.getElementById('confirm-msg').textContent=msg||'';
    const acts=document.getElementById('confirm-acts');
    acts.innerHTML='<button class="c-btn yes" onclick="confirmResolve(true)">'+(opts.okText||'확인')+'</button>';
    document.getElementById('confirm-modal').classList.add('show');
    _attachConfirmKeyHandler(true);
  });
}
let _confirmKeyHandler=null;
function _attachConfirmKeyHandler(isAlert){
  if(_confirmKeyHandler)document.removeEventListener('keydown',_confirmKeyHandler);
  _confirmKeyHandler=function(e){
    if(e.key==='Escape'){
      e.preventDefault();
      confirmResolve(isAlert?true:false);  // alert는 Esc=확인, confirm은 Esc=취소
    }else if(e.key==='Enter'){
      e.preventDefault();
      confirmResolve(true);
    }
  };
  document.addEventListener('keydown',_confirmKeyHandler);
}
function confirmResolve(v){
  document.getElementById('confirm-modal').classList.remove('show');
  if(_confirmKeyHandler){document.removeEventListener('keydown',_confirmKeyHandler);_confirmKeyHandler=null;}
  if(_confirmResolve){var r=_confirmResolve;_confirmResolve=null;r(v);}
}

function focusField(id){
  var el=document.getElementById(id);
  if(!el)return;
  // 모달 안에서 부드러운 스크롤
  el.scrollIntoView({behavior:'smooth',block:'center'});
  setTimeout(function(){
    if(typeof el.showPicker==='function'){try{el.showPicker();}catch(e){el.focus();}}
    else el.focus();
    // 시각 강조 추가 (보라 outline + 화살표)
    addFieldAttention(el);
  },300);
}

function addFieldAttention(el){
  // 기존 강조 제거 (다른 필드에 남아있을 수 있음)
  document.querySelectorAll('.field-attention').forEach(function(n){n.classList.remove('field-attention')});
  document.querySelectorAll('.field-arrow').forEach(function(n){n.parentNode.removeChild(n)});
  // 새 강조 추가
  el.classList.add('field-attention');
  var arrow=document.createElement('div');
  arrow.className='field-arrow';
  if(el.nextSibling)el.parentNode.insertBefore(arrow,el.nextSibling);
  else el.parentNode.appendChild(arrow);
  // 사용자가 입력/선택하면 즉시 제거
  var remove=function(){
    el.classList.remove('field-attention');
    if(arrow.parentNode)arrow.parentNode.removeChild(arrow);
    el.removeEventListener('input',remove);
    el.removeEventListener('change',remove);
  };
  el.addEventListener('input',remove,{once:true});
  el.addEventListener('change',remove,{once:true});
  // 5초 후 자동 제거 (입력 없으면)
  setTimeout(remove,5000);
}

async function approvePromo(){
  if(!editing?.existing)return;
  if(userRole!=='admin'){showToast('관리자만 할 수 있어요','error');return;}
  const ok=await showConfirm('이 홍보 신청을 승인할까요?');if(!ok)return;
  showOverlayLoad();
  try{
    // 진행 상태 = "예정"으로 변경 + 시간/날짜 등은 modal 폼에서 현재 값으로
    const ri=editing.existing._rowIndex;
    // 현재 모달 폼의 값으로 갱신 (관리자가 시간/날짜 조정 가능)
    document.getElementById('f-status').value='예정';
    await saveEntry();  // saveEntry가 새 row 만들고 기존 row 삭제 (수정 패턴)
    showToast('승인됐어요');
  }catch(e){showToast('승인 실패: '+e.message,'error');}
  finally{hideOverlayLoad();}
}

async function rejectPromo(){
  if(!editing?.existing)return;
  if(userRole!=='admin'){showToast('관리자만 할 수 있어요','error');return;}
  const ok=await showConfirm('이 홍보 신청을 거절할까요? 삭제돼요.');if(!ok)return;
  showOverlayLoad();
  try{
    const ri=editing.existing._rowIndex;
    await api('DELETE','/api/records/'+ri);
    closeModal();
    await syncReload(-1);
    closePanel();
    showToast('거절했어요');
  }catch(e){showToast('거절 실패: '+e.message,'error');}
  finally{hideOverlayLoad();}
}

async function deleteRec(rowIndex,dateKey){
  if(userRole!=='admin'){showToast('관리자만 삭제할 수 있어요','error');return;}
  const ok=await showConfirm('정말로 삭제할까요?');
  if(!ok)return;
  showOverlayLoad();
  try{
    await api('DELETE','/api/records/'+rowIndex);
    await syncReload(-1);
    closePanel();
    showToast('삭제됐어요');
  }catch(e){showToast('삭제 실패: '+e.message,'error');}
  finally{hideOverlayLoad();}
}

let _drag=null;
function onEvDragStart(ev,rowIndex,fromKey){
  _drag={rowIndex:rowIndex,fromKey:fromKey};
  ev.dataTransfer.effectAllowed='move';
  try{ev.dataTransfer.setData('text/plain',String(rowIndex));}catch(_){}
  ev.currentTarget.classList.add('ev-dragging');
}
function onEvDragEnd(ev){
  ev.currentTarget.classList.remove('ev-dragging');
  document.querySelectorAll('.c.drag-over').forEach(function(c){c.classList.remove('drag-over');});
  _drag=null;
}
function onCellDragOver(ev){
  if(!_drag)return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect='move';
  ev.currentTarget.classList.add('drag-over');
}
function onCellDragLeave(ev){
  if(!ev.currentTarget.contains(ev.relatedTarget))ev.currentTarget.classList.remove('drag-over');
}
async function onCellDrop(ev,toKey){
  if(userRole!=='admin')return;
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  if(!_drag)return;
  const drag=Object.assign({},_drag);
  _drag=null;
  if(drag.fromKey===toKey)return;
  // 특수일정 이동
  if(drag.sp){
    const it=PROMO_SPECIAL.find(function(s){return s._rowIndex===drag.rowIndex;});
    if(!it){showToast('담당자 일정을 찾을 수 없어요','error');return;}
    const ok=await showConfirm('담당자 일정을 '+toKey+'(으)로 이동할까요?');
    if(!ok)return;
    // delta 계산 (drag fromKey가 정확한 출발 셀)
    const fp=drag.fromKey.split('-').map(Number);
    const tp=toKey.split('-').map(Number);
    const fromDate=new Date(fp[0],fp[1]-1,fp[2]);
    const toDate=new Date(tp[0],tp[1]-1,tp[2]);
    const delta=Math.round((toDate-fromDate)/86400000);
    // start, end 둘 다 delta 만큼 이동
    function addDays(key,n){
      const p=key.split('-').map(Number);
      const dt=new Date(p[0],p[1]-1,p[2]);
      dt.setDate(dt.getDate()+n);
      return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    }
    const newStart=addDays(it.start,delta);
    const newEnd=it.end?addDays(it.end,delta):newStart;
    const now=new Date();
    const kstStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
    const values=['',it.kstStr||kstStr,it.id||('SP-'+Date.now()),newStart,newEnd,it.time||'',it.type||'',it.label||'',it.person||'',it.author||'',''];
    showOverlayLoad();
    try{
      await api('PATCH','/api/sheet/special/'+drag.rowIndex,{values:values});
      await loadPromoSpecial();
      renderCal();
      if(panelOpen&&selected){
        const d=new Date(selected);
        openPanel(d,getRecsForDate(d));
      }
      showToast('이동됐어요');
    }catch(e){
      showToast('이동 실패: '+(e.message||e),'error');
    }finally{
      hideOverlayLoad();
    }
    return;
  }
  // === 기존 콘텐츠 이동 ===
  const ok=await showConfirm('정말로 일정을 이동할까요?');
  if(!ok)return;
  const rec=records.find(function(r){return r._rowIndex===drag.rowIndex;});
  if(!rec){showToast('레코드를 찾을 수 없어요','error');return;}
  const[y,m,d]=toKey.split('-').map(Number),dateObj=new Date(y,m-1,d),dn=DAY_NAMES[dateObj.getDay()];
  const serial=Math.floor(Date.UTC(y,m-1,d)/86400000)+25569;
  var ts=rec['입력시간(KST)'],hhmm='10:00';
  if(typeof ts==='string'&&ts.indexOf(' ')>-1)hhmm=ts.split(' ')[1].substr(0,5);
  else if(typeof ts==='number'){var tm=Math.round((ts%1)*1440),hh=Math.floor(tm/60),mm=tm%60;hhmm=String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');}
  const kstStr=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')} ${hhmm}`;
  const row=[records.length+1,kstStr,serial,y,m,d,dn+'요일',rec['플랫폼 1']||'',rec['플랫폼 2']||'',rec['콘텐츠 구분']||'',rec['프로그램']||'',rec['담당 부서']||'예술사업팀',rec['콘텐츠 제목']||'',rec['콘텐츠 형식']||'',rec['콘텐츠 내용']||'',rec['게시 담당자']||'',rec['진행 상태']||'예정',rec['비고']||''];
  showOverlayLoad();
  try{
    await api('POST','/api/records',{values:row});
    try{await api('DELETE','/api/records/'+drag.rowIndex);}
    catch(e){console.error('이동 후 기존 행 삭제 실패:',e);showToast('이동됨. 단, 기존 행 삭제 실패로 중복이 생겼을 수 있어','error');}
    await syncReload(0);
    closePanel();
    showToast('이동됐어요');
  }catch(e){showToast('이동 실패: '+e.message,'error');}
  finally{hideOverlayLoad();}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(_confirmResolve)confirmResolve(false);else{closeModal();closeProgFilter();closePanel();}}});
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
document.getElementById('prog-modal').addEventListener('click',e=>{if(e.target.id==='prog-modal')closeProgFilter();});
document.getElementById('confirm-modal').addEventListener('click',e=>{if(e.target.id==='confirm-modal')confirmResolve(false);});
</script>
