function focusField(id){
  var el=document.getElementById(id);
  if(!el)return;
  // 모달 안에서 부드러운 스크롤
  el.scrollIntoView({behavior:'smooth',block:'center'});
  setTimeout(function(){
    if(typeof el.showPicker==='function'){try{el.showPicker();}catch(e){el.focus();}}
    else el.focus();
    // 시각 강조 추가 (보라 outline + 화살표)
    addFieldAttention(el);
  },300);
}

function addFieldAttention(el){
  // 기존 강조 제거 (다른 필드에 남아있을 수 있음)
  document.querySelectorAll('.field-attention').forEach(function(n){n.classList.remove('field-attention')});
  document.querySelectorAll('.field-arrow').forEach(function(n){n.parentNode.removeChild(n)});
  // 새 강조 추가
  el.classList.add('field-attention');
  var arrow=document.createElement('div');
  arrow.className='field-arrow';
  if(el.nextSibling)el.parentNode.insertBefore(arrow,el.nextSibling);
  else el.parentNode.appendChild(arrow);
  // 사용자가 입력/선택하면 즉시 제거
  var remove=function(){
    el.classList.remove('field-attention');
    if(arrow.parentNode)arrow.parentNode.removeChild(arrow);
    el.removeEventListener('input',remove);
    el.removeEventListener('change',remove);
  };
  el.addEventListener('input',remove,{once:true});
  el.addEventListener('change',remove,{once:true});
  // 5초 후 자동 제거 (입력 없으면)
  setTimeout(remove,5000);
}

async function saveEntry(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){alert('콘텐츠 제목을 입력하세요');focusField('f-title');return;}
  const platSel=document.getElementById('f-plat').value;
  // plat2 필수 검증 (블로그·맘카페 / B2B / 문자)
  if(platSel==='블로그·맘카페'||platSel==='B2B'||platSel==='문자'){
    if(!document.getElementById('f-plat2').value){alert('플랫폼 2를 선택해주세요');focusField('f-plat2');return;}
  }
  // 콘텐츠 구분 필수
  if(!document.getElementById('f-cat').value){alert('콘텐츠 구분을 선택해주세요');focusField('f-cat');return;}
  // 게시 담당자 필수
  if(!document.getElementById('f-author').value){alert('게시 담당자를 선택해주세요');focusField('f-author');return;}
  // 날짜는 폼의 f-date에서 (사용자가 변경 가능)
  const dateKey=document.getElementById('f-date').value||editing.dateKey;
  if(!dateKey){alert('날짜를 입력해주세요');focusField('f-date');return;}
  const isEdit=!!(editing.existing);
  const existingRowIndex=editing.existing&&editing.existing._rowIndex;
  const[y,m,d]=dateKey.split('-').map(Number),dateObj=new Date(y,m-1,d),dn=DAY_NAMES[dateObj.getDay()];
  const serial=Math.floor(Date.UTC(y,m-1,d)/86400000)+25569;
  const ft=document.getElementById('f-time').value||'10:00';
  const kstStr=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')} ${ft}`;
  let plat1=platSel,plat2='';
  if(platSel==='기타'){
    const etc=document.getElementById('f-plat-etc').value.trim();
    plat1=etc||'기타';plat2='-';
  }else if(platSel==='카카오톡'||platSel==='인스타그램'){
    plat2='-';
  }else{
    plat2=document.getElementById('f-plat2').value;
  }
  const row=[records.length+1,kstStr,serial,y,m,d,dn+'요일',plat1,plat2,document.getElementById('f-cat').value,document.getElementById('f-program').value,'예술사업팀',title,document.getElementById('f-format').value,document.getElementById('f-content').value,document.getElementById('f-author').value,document.getElementById('f-status').value,document.getElementById('f-memo').value];
  showOverlayLoad();
  try{
    await api('POST','/api/records',{values:row});
    if(isEdit&&existingRowIndex){
      try{await api('DELETE','/api/records/'+existingRowIndex);}
      catch(e){console.error('수정 후 기존 행 삭제 실패:',e);alert('저장됨. 단, 기존 행 삭제 실패로 중복이 생겼을 수 있어. 패널에서 확인해줘.');}
    }
    closeModal();
    await syncReload(isEdit?0:1);
    clickDate(dateKey);
    showToast('저장되었습니다');
  }catch(e){alert('저장 실패: '+e.message);}
  finally{hideOverlayLoad();}
}

  if(!editing?.existing)return;

async function approvePromo(){
  if(!editing?.existing)return;
  if(userRole!=='admin'){showToast('관리자만 가능','error');return;}
  const ok=await showConfirm('이 홍보 신청을 승인하시겠습니까?');if(!ok)return;

    // 진행 상태 = "예정"으로 변경 + 시간/날짜 등은 modal 폼에서 현재 값으로

let _drag=null;
function onEvDragStart(ev,rowIndex,fromKey){
  _drag={rowIndex:rowIndex,fromKey:fromKey};
  ev.dataTransfer.effectAllowed='move';
  try{ev.dataTransfer.setData('text/plain',String(rowIndex));}catch(_){}
  ev.currentTarget.classList.add('ev-dragging');
}
function onEvDragEnd(ev){
  ev.currentTarget.classList.remove('ev-dragging');
  document.querySelectorAll('.c.drag-over').forEach(function(c){c.classList.remove('drag-over');});
  _drag=null;
}
function onCellDragOver(ev){
  if(!_drag)return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect='move';
  ev.currentTarget.classList.add('drag-over');
}
function onCellDragLeave(ev){
  if(!ev.currentTarget.contains(ev.relatedTarget))ev.currentTarget.classList.remove('drag-over');
}
async function onCellDrop(ev,toKey){
  if(userRole!=='admin')return;
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  if(!_drag)return;
  const drag={rowIndex:_drag.rowIndex,fromKey:_drag.fromKey};
  _drag=null;
  if(drag.fromKey===toKey)return;
  const ok=await showConfirm('정말로 일정을 이동하시겠습니까?');
  if(!ok)return;
  const rec=records.find(function(r){return r._rowIndex===drag.rowIndex;});
  if(!rec){alert('레코드를 찾을 수 없음');return;}
  const[y,m,d]=toKey.split('-').map(Number),dateObj=new Date(y,m-1,d),dn=DAY_NAMES[dateObj.getDay()];
  const serial=Math.floor(Date.UTC(y,m-1,d)/86400000)+25569;
  var ts=rec['입력시간(KST)'],hhmm='10:00';
  if(typeof ts==='string'&&ts.indexOf(' ')>-1)hhmm=ts.split(' ')[1].substr(0,5);
  else if(typeof ts==='number'){var tm=Math.round((ts%1)*1440),hh=Math.floor(tm/60),mm=tm%60;hhmm=String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');}
  const kstStr=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')} ${hhmm}`;
  const row=[records.length+1,kstStr,serial,y,m,d,dn+'요일',rec['플랫폼 1']||'',rec['플랫폼 2']||'',rec['콘텐츠 구분']||'',rec['프로그램']||'',rec['담당 부서']||'예술사업팀',rec['콘텐츠 제목']||'',rec['콘텐츠 형식']||'',rec['콘텐츠 내용']||'',rec['게시 담당자']||'',rec['진행 상태']||'예정',rec['비고']||''];
  showOverlayLoad();
  try{
    await api('POST','/api/records',{values:row});
    try{await api('DELETE','/api/records/'+drag.rowIndex);}
    catch(e){console.error('이동 후 기존 행 삭제 실패:',e);alert('이동됨. 단, 기존 행 삭제 실패로 중복이 생겼을 수 있어.');}
    await syncReload(0);
    closePanel();
    showToast('이동되었습니다');
  }catch(e){alert('이동 실패: '+e.message);}
  finally{hideOverlayLoad();}
}
