<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<!--
  к°ҖкІ©н‘ң н…ңн”ҢлҰҝ (мҡҙмҳҒмһҗ мҠ№мқё м „лЎҖ 1нҳё вҖ” көҗмңЎмӢӨ лҢҖкҙҖлЈҢ, кІҪмң„ = docs/мһ‘м—…мқҙл Ҙ.md)
  В· нҶ нҒ°(:root)мқҖ shot.jsк°Җ index.htmlм—җм„ң л ҢлҚ” мӢң мһҗлҸҷ мЈјмһ… вҖ” м—¬кё°м—җ мғү мӮ¬ліёВ·raw мғүмқ„ л„Јм§Җ л§Ҳлқј(м ң1 м ҲлҢҖлӘ…л №).
    лӢЁлҸ…мңјлЎң м—ҙл©ҙ л¬ҙмғүмңјлЎң ліҙмқҙлҠ” кІҢ м •мғҒ. л ҢлҚ”лҠ” л°ҳл“ңмӢң tools/promo/shot.jsлЎң.
  В· лӮҙмҡ© көҗмІҙ нҸ¬мқёнҠё: <h1> м ңлӘ© В· .group(м„№м…ҳ лқјлІЁ) В· .row.item(н–ү) ліөм ң/мҲҳм •.
    л‘җ лІҲм§ё м„№м…ҳ лқјлІЁ = .group.g2(мӮҙлӘ¬ нҸ¬мқёнҠё) вҖ” м„№м…ҳмқҙ 1к°ңл©ҙ g2 лё”лЎқ мӮӯм ң.
  В· м»¬лҹј кө¬м„ұмқҙ 2к°ң(кё°ліё/м¶”к°Җ)мҷҖ лӢӨлҘҙл©ҙ .row grid-template-columnsмҷҖ .headлҘј н•Ёк»ҳ мЎ°м •.
-->
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  font-family:'Noto Sans KR','Noto Sans CJK KR',sans-serif;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  letter-spacing:-0.01em;
  padding:44px 48px;
}
.card{
  background:var(--surface-solid);
  border-radius:var(--radius-xl);
  box-shadow:var(--glass-shadow);
  padding:40px 44px 36px;
}
h1{font-size:27px;font-weight:800;letter-spacing:-0.02em}
h1 .bar{display:inline-block;width:5px;height:22px;border-radius:3px;background:var(--accent);margin-right:12px;vertical-align:-2px}
.row{display:grid;grid-template-columns:1fr 150px 150px;align-items:center}
.head{margin-top:26px;padding-bottom:11px;border-bottom:2px solid var(--text)}
.head span{font-size:13px;font-weight:700;color:var(--dim)}
.head span:nth-child(n+2),.item span:nth-child(n+2){text-align:right}
.group{margin-top:24px;display:flex;align-items:center;gap:9px}
.group .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.group b{font-size:15.5px;font-weight:800;color:var(--accent)}
.group.g2 .dot{background:var(--peach-text)}
.group.g2 b{color:var(--peach-text)}
.item{padding:15px 0;border-bottom:1px solid var(--border)}
.item:last-of-type{border-bottom:none}
.item .name{font-size:16.5px;font-weight:600}
.item .name small{display:block;font-size:12.5px;font-weight:500;color:var(--dim);margin-top:3px}
.item .price{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
.item .price em{font-style:normal;font-size:13px;font-weight:600;color:var(--dim);margin-left:1px}
.item .extra{font-size:15.5px;font-weight:600;color:var(--neutral-text);font-variant-numeric:tabular-nums}
.item .extra em{font-style:normal;font-size:12.5px;color:var(--dim);margin-left:1px}
</style>
</head>
<body>
<div class="card">
  <h1><span class="bar"></span>көҗмңЎмӢӨ лҢҖкҙҖлЈҢ</h1>

  <div class="row head">
    <span>кіөк°„</span><span>4мӢңк°„</span><span>м¶”к°Җ 1мӢңк°„</span>
  </div>

  <div class="group"><span class="dot"></span><b>мҳҲмҡёл§ҲлЈЁ(л§қл§Ҳ)</b></div>
  <div class="row item">
    <span class="name">3мёө В· 7мёө көҗмңЎмӢӨ</span>
    <span class="price">100,000<em>мӣҗ</em></span>
    <span class="extra">25,000<em>мӣҗ</em></span>
  </div>
  <div class="row item">
    <span class="name">6мёө көҗмңЎмӢӨ 1~4</span>
    <span class="price">40,000<em>мӣҗ</em></span>
    <span class="extra">10,000<em>мӣҗ</em></span>
  </div>

  <div class="group g2"><span class="dot"></span><b>мһҘлҸ„</b></div>
  <div class="row item">
    <span class="name">мһҘлҸ„ көҗмңЎмӢӨ</span>
    <span class="price">40,000<em>мӣҗ</em></span>
    <span class="extra">10,000<em>мӣҗ</em></span>
  </div>
</div>
</body>
</html>
