<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>플레이그라운드 — 예울마루</title>
<style>
  /* 색은 전부 예울마루 루트 디자인 토큰 계승(index.html :root) — 새 색 창작 없음 */
  :root{
    --accent:#4A4DE7;
    --text:#1A1A2E;
    --dim:#888;
    --surface:#fff;
    --border:rgba(0,0,0,0.09);
    --radius-lg:20px;
    --glass-shadow:0 8px 32px rgba(74,77,231,0.08),0 2px 8px rgba(0,0,0,0.04);
    --elev:0 20px 56px rgba(74,77,231,.16),0 6px 18px rgba(26,26,46,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    color:var(--text);
    background:linear-gradient(135deg,#FDF6F3 0%,#F0EBF5 50%,#EBF0F8 100%);
    min-height:100vh;
    padding:clamp(24px,6vw,64px);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  header{max-width:880px;margin:0 auto 40px}
  .kicker{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--accent);text-transform:uppercase}
  h1{font-size:clamp(28px,5vw,42px);font-weight:800;margin:6px 0 10px;letter-spacing:-.01em}
  .lead{color:var(--dim);font-size:15px;max-width:56ch}
  .grid{max-width:880px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
  .card{
    display:block;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);padding:24px;text-decoration:none;color:inherit;
    box-shadow:var(--glass-shadow);transition:transform .18s ease,box-shadow .18s ease;
  }
  .card:hover{transform:translateY(-3px);box-shadow:var(--elev)}
  .card .emoji{font-size:32px;display:block;margin-bottom:12px;line-height:1}
  .card h2{font-size:18px;font-weight:700;margin-bottom:6px}
  .card p{font-size:13.5px;color:var(--dim)}
  .card .tag{display:inline-block;margin-top:14px;font-size:12px;font-weight:600;color:var(--accent)}
  footer{max-width:880px;margin:48px auto 0;font-size:12px;color:var(--dim)}
</style>
</head>
<body>
  <header>
    <div class="kicker">Playground</div>
    <h1>플레이그라운드</h1>
    <p class="lead">예울마루 홍보 계획표 본편과 분리된 실험·부속 콘텐츠 모음. 여기에 앞으로 이것저것 추가됩니다.</p>
  </header>
  <main class="grid">
    <a class="card" href="enneagram/">
      <span class="emoji">🧭</span>
      <h2>에니어그램 툴킷</h2>
      <p>유튜브 강의 50편을 재구성한 성격유형 분석기 + 교재. 인터넷 없이 열리는 오프라인 단일 앱.</p>
      <span class="tag">열기 →</span>
    </a>
    <a class="card" href="ticket-seller/">
      <span class="emoji">🎫</span>
      <h2>티켓 셀러</h2>
      <p>예울마루 × 티켓링크 판매·정산 프로세스 순서도. 채널 수수료·운영 문의 9건을 동그라미 토글로, 종합 보고서를 모달로.</p>
      <span class="tag">열기 →</span>
    </a>
  </main>
  <footer>예울마루 · 내부 학습용</footer>
</body>
</html>
