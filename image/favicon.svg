<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- GS칼텍스 예울마루 브랜드 파비콘 — 인디고(#4A4DE7 = accent 토큰) 타일 + 흰색 GS Caltex / YEULMARU 워드마크. 팔레트 폐쇄형 준수. -->
  <rect width="512" height="512" rx="116" fill="#4A4DE7"/>
  <g font-family="'Liberation Sans','Helvetica Neue',Arial,sans-serif" fill="#ffffff" text-anchor="middle">
    <text x="256" y="212" font-size="62" letter-spacing="0.5"><tspan font-weight="700">GS</tspan><tspan font-weight="400"> Caltex</tspan></text>
    <text x="256" y="322" font-size="100" font-weight="700" letter-spacing="-3" stroke="#ffffff" stroke-width="1.6">YEULMARU</text>
  </g>
