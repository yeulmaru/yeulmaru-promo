<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="gBlue" cx="42%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#6E86FF"/><stop offset="55%" stop-color="#3E55E8"/><stop offset="100%" stop-color="#2B3ECB"/>
    </radialGradient>
    <radialGradient id="gAzure" cx="42%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#7CCBFF"/><stop offset="60%" stop-color="#3A9BEE"/><stop offset="100%" stop-color="#2E86E0"/>
    </radialGradient>
    <radialGradient id="gCyan" cx="42%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#AEEBFF"/><stop offset="60%" stop-color="#49CBF4"/><stop offset="100%" stop-color="#31B4E6"/>
    </radialGradient>
    <radialGradient id="gWhite" cx="42%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#E7F1FF"/>
    </radialGradient>
    <linearGradient id="gDart" x1="8%" y1="6%" x2="78%" y2="92%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".95"/><stop offset="55%" stop-color="#EAF3FF" stop-opacity=".78"/><stop offset="100%" stop-color="#BFD6FF" stop-opacity=".55"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#2B3ECB" flood-opacity="0.22"/>
    </filter>
    <filter id="dds" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="2" dy="6" stdDeviation="7" flood-color="#2B3ECB" flood-opacity="0.28"/>
    </filter>
  </defs>
  <g filter="url(#ds)">
    <ellipse cx="256" cy="272" rx="236" ry="236" fill="#2436B8"/>
    <circle cx="256" cy="256" r="236" fill="url(#gBlue)"/>
    <circle cx="256" cy="256" r="192" fill="url(#gWhite)"/>
    <circle cx="256" cy="256" r="150" fill="url(#gAzure)"/>
    <circle cx="256" cy="256" r="98"  fill="url(#gWhite)"/>
    <circle cx="256" cy="256" r="56"  fill="url(#gCyan)"/>
    <ellipse cx="212" cy="150" rx="150" ry="66" fill="#ffffff" opacity="0.10"/>
  </g>
  <!-- 반투명 프로스트 다트: 샤프트(좌상단 밖) + 화살촉(불즈아이 정중앙) -->
  <g filter="url(#dds)">
    <polygon points="91,83 205,183 183,205 69,105" fill="url(#gDart)" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2.5" stroke-linejoin="round"/>
    <polygon points="256,256 157,231 231,157" fill="url(#gDart)" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
</svg>
