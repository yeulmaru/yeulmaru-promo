<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 예울마루 브랜드 파비콘 — 살몬(#D88455)→인디고(#4A4DE7) 오라 오브 + '예' 모노그램. 팔레트 폐쇄형 준수. -->
  <defs>
    <clipPath id="r"><rect width="512" height="512" rx="116"/></clipPath>
    <radialGradient id="warm" gradientUnits="userSpaceOnUse" cx="196" cy="176" r="252">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".92"/>
      <stop offset="20%" stop-color="#F0C4B8"/>
      <stop offset="47%" stop-color="#D88455"/>
      <stop offset="76%" stop-color="#D88455" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" gradientUnits="userSpaceOnUse" cx="424" cy="300" r="300">
      <stop offset="0%" stop-color="#4A4DE7" stop-opacity=".95"/>
      <stop offset="60%" stop-color="#4A4DE7" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <g clip-path="url(#r)">
    <rect width="512" height="512" fill="#1A1A2E"/>
    <g filter="url(#glow)">
      <rect width="512" height="512" fill="url(#cool)"/>
      <rect width="512" height="512" fill="url(#warm)"/>
    </g>
    <!-- thermal-head 텍스처: 미세 컨투어 링(대형에서만 보임) -->
    <g fill="none" stroke="#ffffff" stroke-opacity=".055" stroke-width="1.5">
      <ellipse cx="238" cy="248" rx="158" ry="196"/>
      <ellipse cx="238" cy="248" rx="116" ry="148"/>
      <ellipse cx="238" cy="248" rx="74" ry="100"/>
    </g>
    <text x="256" y="272" font-family="Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif" font-weight="800" font-size="316" letter-spacing="-8" fill="#ffffff" fill-opacity=".16" text-anchor="middle" dominant-baseline="central">예</text>
  </g>
</svg>
