<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>예울마루 사이니지</title>
  <!-- 1시간마다 페이지 전체 새로고침 (Tizen 안정성용) -->
  <meta http-equiv="refresh" content="3600">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      cursor: none;
    }
    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
    .slide.active {
      opacity: 1;
    }
    .slide img {
      max-width: 100%;
      max-height: 100%;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }
    .status {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-size: 11px;
      color: #333;
      font-family: monospace;
      opacity: 0.3;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <div class="status" id="status"></div>

  <script>
    const SLIDE_DURATION = 8000;       // 각 슬라이드 표시 시간 (ms)
    const MANIFEST_RELOAD = 5 * 60 * 1000;  // 매니페스트 재로드 주기 (5분)

    let images = [];
    let currentIndex = 0;
    let slideTimer = null;
    let lastManifestHash = '';

    async function loadManifest() {
      try {
        const res = await fetch(`manifest.json?t=${Date.now()}`);
        const data = await res.json();
        const hash = JSON.stringify(data.images);

        if (hash !== lastManifestHash) {
          lastManifestHash = hash;
          images = data.images || [];
          buildSlides();
          startSlideshow(data.slideDuration || SLIDE_DURATION);
        }
        updateStatus(`OK ${images.length}장`);
      } catch (e) {
        updateStatus(`ERROR: ${e.message}`);
        setTimeout(loadManifest, 10000);
      }
    }

    function buildSlides() {
      const stage = document.getElementById('stage');
      stage.innerHTML = '';
      images.forEach((src, i) => {
        const slide = document.createElement('div');
        slide.className = 'slide';
        if (i === 0) slide.classList.add('active');
        const img = document.createElement('img');
        img.src = `${encodeURI(src)}?t=${Date.now()}`;
        img.alt = '';
        slide.appendChild(img);
        stage.appendChild(slide);
      });
      currentIndex = 0;
    }

    function startSlideshow(duration) {
      if (slideTimer) clearInterval(slideTimer);
      if (images.length <= 1) return;
      slideTimer = setInterval(() => {
        const slides = document.querySelectorAll('.slide');
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % images.length;
        slides[currentIndex].classList.add('active');
      }, duration);
    }

    function updateStatus(msg) {
      document.getElementById('status').textContent =
        `${new Date().toLocaleString('ko-KR')} | ${msg}`;
    }

    loadManifest();
    setInterval(loadManifest, MANIFEST_RELOAD);
  </script>
</body>
</html>
