name: 네이버 블로그 초안 요청
description: 주제와 내용을 적어 올리면 AI가 톤을 반영해 블로그 초안을 만들어 댓글로 달아줍니다.
title: "[블로그] "
body:
  - type: markdown
    attributes:
      value: "주제와 핵심 내용을 채우고 **Submit** 하면, 잠시 뒤 AI가 작성한 초안이 이 이슈에 댓글로 달려요. (실행에 1~2분 걸릴 수 있어요)"
  - type: dropdown
    id: template
    attributes:
      label: 글 유형
      options:
        - 공연 안내
        - 공연 후기
        - 전시 소개
        - 프로그램 소개
        - 행사 스케치
        - 자유형
    validations:
      required: true
  - type: input
    id: topic
    attributes:
      label: 글의 주제
      placeholder: "예) 6월 화요살롱 — 이낙준 작가 초청 강연"
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: 핵심 내용
      description: 일시·장소·출연·관람료·관람 포인트 등 아는 정보를 자유롭게 적어주세요.
      placeholder: |
        일시 : 2026-06-30 (화) 19:30
        장소 : 예울마루 소극장
        출연 : 이낙준 작가
        관람료 : 전석 2만원
        포인트 : 베스트셀러 작가의 글쓰기 이야기
    validations:
      required: true
  - type: dropdown
    id: length
    attributes:
      label: 분량
      options:
        - 짧게
        - 보통
        - 길게
  - type: dropdown
    id: voice
    attributes:
      label: 말투
      options:
        - 정중하고 따뜻한
        - 친근하고 편안한
        - 감각적이고 생생한
  - type: checkboxes
    id: options
    attributes:
      label: 옵션
      options:
        - label: 이모지 사용
        - label: 해시태그 포함
  - type: textarea
    id: tone
    attributes:
      label: 톤 참조 (선택)
      description: 예전에 잘 쓴 블로그 글을 붙여넣으면 그 말투·문체를 따라 씁니다.
