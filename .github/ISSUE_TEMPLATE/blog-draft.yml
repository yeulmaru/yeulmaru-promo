name: 네이버 블로그 초안 요청
description: 목적·타겟·핵심 메시지를 적어 올리면 AI가 톤을 반영해 블로그 초안을 만들어 댓글로 달아줍니다.
title: "[블로그] "
body:
  - type: markdown
    attributes:
      value: "주제와 핵심 메시지를 채우고 **Submit** 하면, 잠시 뒤 AI가 작성한 초안이 이 이슈에 댓글로 달려요. (실행에 1~2분 걸릴 수 있어요)"
  - type: input
    id: topic
    attributes:
      label: 글의 주제
      placeholder: "예) 6월 화요살롱 — 이낙준 작가 초청 강연"
    validations:
      required: true
  - type: input
    id: purpose
    attributes:
      label: 글의 목적
      placeholder: "예) 예매를 유도하고 싶다 / 행사 분위기를 알리고 싶다"
  - type: input
    id: target
    attributes:
      label: 주요 타겟
      placeholder: "예) 여수·인근 3040 가족 / 클래식 입문자"
  - type: input
    id: key1
    attributes:
      label: 핵심 메시지 1
      placeholder: "가장 중요한 메시지"
    validations:
      required: true
  - type: input
    id: key2
    attributes:
      label: 핵심 메시지 2
  - type: input
    id: key3
    attributes:
      label: 핵심 메시지 3
  - type: dropdown
    id: length
    attributes:
      label: 분량
      options:
        - 짧게
        - 보통
        - 길게
  - type: dropdown
    id: voice
    attributes:
      label: 말투
      options:
        - 정중하고 따뜻한
        - 친근하고 편안한
        - 감각적이고 생생한
  - type: checkboxes
    id: options
    attributes:
      label: 옵션
      options:
        - label: 이모지 사용
  - type: textarea
    id: tone
    attributes:
      label: 톤 참조 (선택)
      description: 예전에 잘 쓴 블로그 글을 붙여넣으면 그 말투·문체를 따라 씁니다.
