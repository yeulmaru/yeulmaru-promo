name: account-selftest

# GH_VARS_TOKEN(Variables 쓰기 PAT)이 이 레포 Variables 를 실제로 read/write/delete 할 수 있는지 실측.
# ⚠️ 활성 계정·카운터는 안 건드림 — 전용 probe 변수만 왕복. Actions 탭에서 수동 실행(Run workflow).
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Variables API PAT 실측(read/write/delete)
        env:
          GH_VARS_TOKEN: ${{ secrets.GH_VARS_TOKEN }}
          ACTIVE_ACCOUNT: ${{ vars.ACTIVE_ACCOUNT || 'EMS1130G' }}
        run: python3 shared/account_failover.py --selftest
