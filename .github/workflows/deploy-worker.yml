name: Worker 배포 (Cloudflare)

# main에 src/index.js 또는 wrangler.toml이 바뀌면 `wrangler deploy`가 자동 실행 → Worker(yeulmaru-promo-api) 배포.
# 이제 git push 한 번이면 GitHub Pages(프론트) + Worker(백엔드) 둘 다 반영 = 수동 Cloudflare 배포 불필요.
#
# ▶ 최초 1회 세팅(운영자): repo Settings > Secrets and variables > Actions > New repository secret
#     CLOUDFLARE_API_TOKEN — Cloudflare 대시보드 > My Profile > API Tokens > "Edit Cloudflare Workers" 템플릿으로 생성해 붙여넣기.
#     (계정이 여러 개라 배포 시 "more than one account" 오류가 나면 CLOUDFLARE_ACCOUNT_ID 시크릿도 추가 — 대시보드 우측 Account ID.)
#   세팅 후: Actions 탭 > "Worker 배포 (Cloudflare)" > Run workflow 로 즉시 테스트 가능(코드 변경 없이 수동 배포).
#
# ⚠️ 앱 비번·SharePoint 자격증명 등 Worker '시크릿'은 Cloudflare에 그대로 남음 — 이 배포는 코드·wrangler.toml(vars/cron/kv)만 올리고 시크릿은 안 건드림.
# ⚠️ 배포 실패(문법 오류 등)해도 Cloudflare는 성공 시에만 전환하므로 라이브 Worker는 이전 버전 유지(무중단).

on:
  push:
    branches: [main]
    paths:
      - 'src/index.js'
      - 'wrangler.toml'
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: wrangler deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
