name: 블로그 초안 생성 (Claude Code CLI)

# 제목이 "[블로그]"로 시작하는 이슈가 열리면 claude -p(구독 OAuth)로 초안 생성 → 댓글.
# ⚠️ 구독 OAuth 토큰(sk-ant-oat…)은 raw Messages API 직접호출 불가(401/403, anthropics/claude-code#37205).
#    → 반드시 claude -p(Claude Code CLI)로만 동작. (Worker/직접 fetch 아님)
# 재시도: 해당 이슈를 닫았다 다시 열면 됩니다.
on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write
  contents: read

jobs:
  draft:
    if: startsWith(github.event.issue.title, '[블로그]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Generate draft with claude -p
        uses: actions/github-script@v7
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G }}
        with:
          retries: 3
          script: |
            const { execFileSync } = require('child_process');
            const issue = context.payload.issue;
            const num = issue.number;
            try { await github.rest.reactions.createForIssue({ ...context.repo, issue_number: num, content: 'eyes' }); } catch (e) {}

            // --- 이슈 폼 파싱 ("### 라벨\n\n값") ---
            function parseForm(body){
              const KNOWN = ['글의 주제','글의 목적','주요 타겟','핵심 메시지 1','핵심 메시지 2','핵심 메시지 3','분량','말투','옵션','톤 참조 (선택)','톤 참조'];
              const buf = {}; let cur = null;
              for (const line of String(body || '').split('\n')){
                const m = line.match(/^###\s+(.+?)\s*$/);
                if (m && KNOWN.indexOf(m[1].trim()) !== -1){ cur = m[1].trim(); buf[cur] = []; continue; }
                if (cur !== null) buf[cur].push(line);
              }
              const out = {}; for (const k in buf){ let v = buf[k].join('\n').trim(); if (v === '_No response_') v = ''; out[k] = v; }
              return out;
            }
            const f = parseForm(issue.body);
            const topic = (f['글의 주제'] || '').trim();
            const purpose = (f['글의 목적'] || '').trim();
            const target = (f['주요 타겟'] || '').trim();
            const keys = ['핵심 메시지 1','핵심 메시지 2','핵심 메시지 3'].map((k) => (f[k] || '').trim()).filter(Boolean);
            const length = (f['분량'] || '보통').trim();
            const voice = (f['말투'] || '정중하고 따뜻한').trim();
            const wantEmoji = /\[x\]\s*이모지/i.test(f['옵션'] || '');
            const tone = (f['톤 참조 (선택)'] || f['톤 참조'] || '').trim();
            if (!topic) { await github.rest.issues.createComment({ ...context.repo, issue_number: num, body: '⚠️ 주제가 비어 있어요. 폼을 채워 새 이슈로 요청해 주세요.' }); return; }

            // --- 톤 참조: 이슈 입력 + 레포 저장본(docs/tone-refs.json) ---
            let savedRefs = [];
            try {
              const rf = await github.rest.repos.getContent({ ...context.repo, path: 'docs/tone-refs.json', ref: context.payload.repository.default_branch });
              savedRefs = JSON.parse(Buffer.from(rf.data.content, 'base64').toString('utf8')) || [];
            } catch (e) {}
            const refTexts = [];
            if (tone) refTexts.push(tone);
            (Array.isArray(savedRefs) ? savedRefs : []).slice(-5).forEach((r) => { if (r && r.text) refTexts.push(String(r.text)); });

            // --- 프롬프트 (claude -p에 stdin으로 전달) ---
            const lenMap = { '짧게': '600~900자 내외로 짧고 간결하게', '보통': '1,200~1,800자 분량으로', '길게': '2,500자 이상 충분히 길고 풍성하게' };
            let prompt = "당신은 GS칼텍스 예울마루(전남 여수의 복합문화예술공간) 홍보 담당자입니다. ";
            prompt += "네이버 블로그에 올릴 한국어 포스팅 초안을 작성하세요. 독자가 읽기 편한 자연스러운 블로그 문체로, 주어진 정보 안에서만 작성하고 없는 사실(가격·일시·출연진 등)은 지어내지 마세요. ";
            prompt += "결과는 곧바로 붙여넣을 수 있게 '제목 한 줄 + 본문'만, 설명·머리말·코드블록 없이 글 본문 텍스트만 출력하세요.\n\n";
            prompt += "# 글의 주제\n" + topic + "\n\n";
            if (purpose) prompt += "# 글의 목적\n" + purpose + "\n\n";
            if (target) prompt += "# 주요 타겟 독자\n" + target + "\n\n";
            if (keys.length) prompt += "# 꼭 전해야 할 핵심 메시지 (모두 자연스럽게 녹일 것)\n" + keys.map((k, i) => (i + 1) + '. ' + k).join('\n') + "\n\n";
            prompt += "# 작성 지침\n- 분량: " + (lenMap[length] || lenMap['보통']) + "\n- 말투/톤: " + voice + " 느낌\n- 이모지: " + (wantEmoji ? '문단 사이에 어울리게 적당히 사용' : '사용하지 않음') + "\n- 해시태그는 넣지 않음\n";
            if (refTexts.length) prompt += "\n# 톤 참조 — 이전에 작성한 글들 (이 말투·문장 길이·문단 구성·이모지 습관을 최대한 비슷하게)\n" + refTexts.map((t, i) => '[예시 ' + (i + 1) + ']\n' + String(t).slice(0, 4000)).join('\n\n');

            // --- claude -p 실행 (구독 OAuth 헤드리스) ---
            let draft = '', err = '';
            try {
              draft = execFileSync('claude', ['-p', '--max-turns', '1'], { input: prompt, encoding: 'utf8', maxBuffer: 20 * 1024 * 1024 }).trim();
            } catch (e) {
              err = String((e && (e.stderr || '')) + ' ' + (e && (e.message || e))).trim().slice(0, 1500);
            }

            if (!draft) {
              await github.rest.issues.createComment({ ...context.repo, issue_number: num, body: '❌ 생성 실패 (`claude -p`)\n\n```\n' + (err || '빈 응답') + '\n```\n\n이슈를 닫았다 다시 열면 재시도합니다.' });
              return;
            }
            await github.rest.issues.createComment({ ...context.repo, issue_number: num, body: '✍️ **AI 초안** · `claude -p` (구독 OAuth)\n\n복사해 네이버 블로그에 붙여넣고 다듬어 주세요.\n\n---\n\n' + draft });
