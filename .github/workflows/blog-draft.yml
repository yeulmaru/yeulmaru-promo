name: 블로그 초안 생성 (AI)

# 제목이 "[블로그]"로 시작하는 이슈가 열리면 실행 (이슈 폼이 제목 접두사를 자동 설정).
# 재시도: 해당 이슈를 닫았다 다시 열면 됩니다.
# ⚠️ issues 이벤트 워크플로/이슈 폼은 '기본 브랜치(main)'에 있어야 동작 → main 병합 필요.
on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  draft:
    if: startsWith(github.event.issue.title, '[블로그]')
    runs-on: ubuntu-latest
    steps:
      - name: Generate blog draft with Claude
        uses: actions/github-script@v7
        env:
          CLAUDE_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G }}
        with:
          script: |
            const issue = context.payload.issue;
            const num = issue.number;
            try { await github.rest.reactions.createForIssue({ ...context.repo, issue_number: num, content: 'eyes' }); } catch (e) {}

            // --- 이슈 폼 본문 파싱 ("### 라벨\n\n값") ---
            function parseForm(body){
              // 알려진 라벨로 시작하는 '### 라벨' 줄만 섹션 경계로 인정 — 본문(톤 참조 등)에
              // 사용자가 붙여넣은 '### 소제목'을 구분자로 오인하지 않도록 줄 단위로 누적.
              const KNOWN = ['글의 주제','글의 목적','주요 타겟','핵심 메시지 1','핵심 메시지 2','핵심 메시지 3','분량','말투','옵션','톤 참조 (선택)','톤 참조'];
              const out = {}; let cur = null; const buf = {};
              for (const line of String(body || '').split('\n')){
                const m = line.match(/^###\s+(.+?)\s*$/);
                if (m && KNOWN.indexOf(m[1].trim()) !== -1){ cur = m[1].trim(); buf[cur] = []; continue; }
                if (cur !== null) buf[cur].push(line);
              }
              for (const k in buf){ let v = buf[k].join('\n').trim(); if (v === '_No response_') v = ''; out[k] = v; }
              return out;
            }
            const f = parseForm(issue.body);
            const topic = (f['글의 주제'] || '').trim();
            const purpose = (f['글의 목적'] || '').trim();
            const target = (f['주요 타겟'] || '').trim();
            const keys = ['핵심 메시지 1','핵심 메시지 2','핵심 메시지 3'].map(function(k){return (f[k]||'').trim();}).filter(Boolean);
            const length = (f['분량'] || '보통').trim();
            const voice = (f['말투'] || '정중하고 따뜻한').trim();
            const optBlock = f['옵션'] || '';
            const wantEmoji = /\[x\]\s*이모지/i.test(optBlock);
            const tone = (f['톤 참조 (선택)'] || f['톤 참조'] || '').trim();

            if (!topic || !keys.length){
              await github.rest.issues.createComment({ ...context.repo, issue_number: num,
                body: '⚠️ 주제와 핵심 메시지가 비어 있어요. 폼을 다시 채워 새 이슈로 요청해 주세요.' });
              return;
            }

            // --- 프롬프트 (앱 내 도구와 동일한 톤) ---
            const lenMap = {'짧게':'600~900자 내외로 짧고 간결하게','보통':'1,200~1,800자 분량으로','길게':'2,500자 이상 충분히 길고 풍성하게'};
            const lengthGuide = lenMap[length] || lenMap['보통'];
            let toneBlock = '';
            if (tone) toneBlock = '\n\n# 톤 참조 — 이전에 작성한 글\n아래 글의 말투, 문장 길이, 어휘, 문단 구성, 이모지 사용 습관을 최대한 비슷하게 따라 써 주세요.\n' + tone.slice(0, 6000);

            const system = "당신은 GS칼텍스 예울마루(전남 여수의 복합문화예술공간)의 홍보 담당자입니다. 네이버 블로그에 올릴 한국어 포스팅 초안을 작성합니다. 글의 '목적'을 달성하고 '주요 타겟 독자'의 눈높이에 맞추며, 지정된 '핵심 메시지'가 본문에 모두 자연스럽게 담기도록 쓰세요. 독자가 읽기 편한 자연스러운 블로그 문체로 쓰되, 주어진 정보 안에서만 작성하고 없는 사실(가격·일시 등)을 지어내지 마세요. 결과는 '제목 한 줄 + 본문'만, 설명·머리말·코드블록 없이 글 본문 텍스트만 출력하세요.";
            const user = "다음 정보로 네이버 블로그 글 초안을 작성해 주세요.\n\n# 글의 주제\n" + topic + (purpose ? "\n\n# 글의 목적\n" + purpose : "") + (target ? "\n\n# 주요 타겟 독자\n" + target : "") + "\n\n# 꼭 전해야 할 핵심 메시지 (모두 본문에 자연스럽게 녹일 것)\n" + keys.map(function(k,i){return (i+1)+'. '+k;}).join('\n') + "\n\n# 작성 지침\n- 분량: " + lengthGuide + "\n- 말투/톤: " + voice + " 느낌\n- 타겟 독자의 관심사에 맞춰 목적을 이루도록 자연스럽게 구성\n- 이모지: " + (wantEmoji ? "문단 사이에 어울리게 적당히 사용" : "사용하지 않음") + "\n- 해시태그는 넣지 않음\n- 주어진 정보에 없는 구체적 사실(가격·날짜·출연진 등)은 임의로 만들지 말 것" + toneBlock;

            // --- Claude 호출 (구독 OAuth 토큰: Bearer + oauth 베타) ---
            const model = 'claude-opus-4-8';
            let draft = '', errMsg = '';
            try {
              const resp = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                  'content-type': 'application/json',
                  'authorization': 'Bearer ' + (process.env.CLAUDE_OAUTH || ''),
                  'anthropic-beta': 'oauth-2025-04-20',
                  'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({ model, max_tokens: (length === '길게' ? 8000 : 4000), system, messages: [{ role: 'user', content: user }] })
              });
              if (!resp.ok) {
                errMsg = 'Anthropic ' + resp.status + ': ' + (await resp.text()).slice(0, 500);
              } else {
                const data = await resp.json();
                draft = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('').trim();
                if (!draft) errMsg = '빈 응답';
              }
            } catch (e) { errMsg = String((e && e.message) || e); }

            if (errMsg) {
              await github.rest.issues.createComment({ ...context.repo, issue_number: num,
                body: '❌ 생성 실패\n\n```\n' + errMsg + '\n```\n\n구독 OAuth 토큰의 API 직접 호출이 제한됐을 수 있어요. 이슈를 닫았다 다시 열면 재시도합니다.' });
              return;
            }

            await github.rest.issues.createComment({ ...context.repo, issue_number: num,
              body: '✍️ **AI 초안** · 모델 `' + model + '`\n\n아래를 복사해 네이버 블로그에 붙여넣고 다듬어 주세요.\n\n---\n\n' + draft });
