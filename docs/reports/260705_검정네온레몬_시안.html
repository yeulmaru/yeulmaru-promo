<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>검정 + 강조 + 네온레몬 · 색 탐색 시안 — 예울마루</title>
<style>
  /* 시안(docs/reports) — 색 탐색용. 확정 색만 index.html :root 토큰 갱신 편입(3점 세트). */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Malgun Gothic',sans-serif;color:#fff;overflow:hidden;background:#05060a}
  #bg{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:0}
  .stage{position:relative;z-index:1;height:100%;display:flex;align-items:center;justify-content:center}
  .card{background:rgba(255,255,255,.05);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.5);border-radius:24px;padding:44px 40px;text-align:center;min-width:330px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .logo{font-size:25px;font-weight:800;color:#fff;letter-spacing:.5px;margin-bottom:20px;white-space:nowrap}
  .logo .thin{font-weight:400}
  .sub{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:26px}
  .msbtn{width:100%;padding:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.35);border-radius:12px;font-size:14px;font-weight:600;color:#fff;cursor:pointer}
  .panel{position:fixed;left:14px;bottom:14px;z-index:3;background:rgba(255,255,255,.08);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:14px 16px;font-size:12px;width:275px;color:#fff}
  .panel h4{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:10px}
  .row{margin-bottom:11px}
  .row label{display:flex;justify-content:space-between;color:rgba(255,255,255,.75);margin-bottom:5px;font-size:11px}
  .row input[type=range]{width:100%;accent-color:#D9FF00}
  .segs{display:flex;gap:6px;flex-wrap:wrap}
  .segs button{flex:1;min-width:82px;font-size:11px;padding:8px 4px;border-radius:10px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);color:#fff;cursor:pointer}
  .segs button.on{background:#D9FF00;color:#05060a;border-color:#D9FF00;font-weight:700}
  .val{color:#D9FF00;font-variant-numeric:tabular-nums}
  .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px;border:1px solid rgba(255,255,255,.35)}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="stage">
  <div class="card">
    <div class="logo"><b>GS</b> <span class="thin">Caltex</span> <b>YEULMARU</b></div>
    <div class="sub">예울마루 홍보 계획표에 오신 걸 환영해요</div>
    <button class="msbtn">Microsoft 계정으로 로그인</button>
  </div>
</div>

<div class="panel">
  <h4>검정 + 강조 + 네온레몬</h4>
  <div class="row">
    <label>프리셋</label>
    <div class="segs" id="seg">
      <button data-p="0" class="on"><span class="sw" style="background:#1E50FF"></span>코발트+레몬</button>
      <button data-p="1"><span class="sw" style="background:#4A4DE7"></span>인디고+레몬</button>
      <button data-p="2"><span class="sw" style="background:#D9FF00"></span>레몬 우세</button>
      <button data-p="3"><span class="sw" style="background:#00E5FF"></span>시안+레몬</button>
    </div>
  </div>
  <div class="row"><label>네온레몬 비율 <span class="val" id="vL">0.55</span></label><input type="range" id="lemon" min="0" max="1" step="0.01" value="0.55"></div>
  <div class="row"><label>발광 세기 <span class="val" id="vB">0.75</span></label><input type="range" id="bright" min="0.3" max="1.4" step="0.01" value="0.75"></div>
  <div class="row" style="margin-bottom:0"><label>흐름 속도 <span class="val" id="vS">0.4</span></label><input type="range" id="speed" min="0" max="1" step="0.01" value="0.4"></div>
</div>

<script>
const cv=document.getElementById('bg');
const gl=cv.getContext('webgl');
const VERT='attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
const FRAG=`precision highp float;
uniform vec2 u_res;uniform float u_time;
uniform vec3 u_base,u_accent,u_neon;
uniform float u_lemon,u_bright;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));vec2 u=f*f*(3.-2.*f);return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.02;a*=.5;}return v;}
float glow(vec2 uv,vec2 c,float k){float d=length(uv-c);return exp(-d*d*k);}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float asp=u_res.x/u_res.y; uv.x*=asp;
  float t=u_time;
  // 유동 도메인 워프
  uv+=0.12*vec2(fbm(uv*1.6+t*0.3),fbm(uv*1.6-t*0.4+7.));
  vec2 ctr=vec2(0.5*asp,0.5);
  // 움직이는 발광 중심들
  vec2 pa=ctr+vec2(0.34*asp*sin(t*0.33),0.30*cos(t*0.41));
  vec2 pn=ctr+vec2(0.40*asp*cos(t*0.29+1.5),0.36*sin(t*0.37+2.));
  vec2 pa2=ctr+vec2(0.30*asp*sin(t*0.23+3.),0.26*cos(t*0.19+1.));
  float wa=glow(uv,pa,7.)+0.6*glow(uv,pa2,5.);
  float wn=glow(uv,pn,8.);
  vec3 col=u_base;
  col+=u_accent*wa*u_bright;
  col+=u_neon*wn*u_lemon*u_bright*1.15;
  // 미세 그레인
  col+=(fbm(gl_FragCoord.xy*0.9)-0.5)*0.02;
  col=clamp(col,0.,1.);
  gl_FragColor=vec4(col,1.);
}`;
function sh(t,s){const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);if(!gl.getShaderParameter(x,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(x));return x;}
const prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(prog);gl.useProgram(prog);
const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const lp=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(lp);gl.vertexAttribPointer(lp,2,gl.FLOAT,false,0,0);
const U=n=>gl.getUniformLocation(prog,n);
const uRes=U('u_res'),uTime=U('u_time'),uBase=U('u_base'),uAcc=U('u_accent'),uNeon=U('u_neon'),uLemon=U('u_lemon'),uBright=U('u_bright');
const hx=h=>[parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255];
// [base 검정, accent 강조, neon 레몬]
const PRE=[
  ['#05060A','#1E50FF','#D9FF00'],
  ['#05060A','#4A4DE7','#CCFF00'],
  ['#070806','#2540C0','#E8FF33'],
  ['#04080A','#00E5FF','#D9FF00']
];
let preset=0,lemon=0.55,bright=0.75,speed=0.4;
function pushCol(){const P=PRE[preset];gl.uniform3fv(uBase,hx(P[0]));gl.uniform3fv(uAcc,hx(P[1]));gl.uniform3fv(uNeon,hx(P[2]));}
pushCol();
function resize(){const d=Math.min(devicePixelRatio||1,2);cv.width=innerWidth*d;cv.height=innerHeight*d;gl.viewport(0,0,cv.width,cv.height);}
addEventListener('resize',resize);resize();
const t0=performance.now();
function frame(now){
  gl.uniform2f(uRes,cv.width,cv.height);
  gl.uniform1f(uTime,(now-t0)/1000*speed*1.5);
  gl.uniform1f(uLemon,lemon);gl.uniform1f(uBright,bright);
  gl.drawArrays(gl.TRIANGLES,0,3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
const bind=(id,set,vid,f)=>{const e=document.getElementById(id);e.oninput=()=>{set(+e.value);document.getElementById(vid).textContent=f?f(+e.value):(+e.value).toFixed(2);};};
bind('lemon',v=>lemon=v,'vL');bind('bright',v=>bright=v,'vB');bind('speed',v=>speed=v,'vS',v=>v.toFixed(1));
document.querySelectorAll('#seg button').forEach(x=>x.onclick=()=>{document.querySelectorAll('#seg button').forEach(y=>y.classList.remove('on'));x.classList.add('on');preset=+x.dataset.p;pushCol();});
</script>
</body>
</html>
