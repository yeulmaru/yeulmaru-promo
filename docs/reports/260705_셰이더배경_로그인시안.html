<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>셰이더 배경 · 로그인 도입 시안 — 예울마루</title>
<style>
  /* ─────────────────────────────────────────────────────────────
     ⚠ 이 시안의 모든 색 = index.html :root 토큰 값 그대로(계승).
     raw 창작 색 없음. 셰이더에 넘기는 hex도 아래 토큰 값과 1:1.
       --bg 3스톱: #FDF6F3 / #F0EBF5 / #EBF0F8
       --accent #4A4DE7 · --accent-light #E8E8FD · --accent-glow rgba(74,77,231,.15)
       --peach #F0C4B8 · --peach-light #FBF0EC · --peach-text(살몬) #D88455
       --surface rgba(255,255,255,.72) · --glass-border rgba(255,255,255,.6)
       --glass-shadow 0 8px 32px rgba(74,77,231,.08),0 2px 8px rgba(0,0,0,.04)
       --text #1A1A2E · --dim #888 · --radius-xl 24px
     ───────────────────────────────────────────────────────────── */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Malgun Gothic',sans-serif;color:#1A1A2E;overflow:hidden;background:#EBF0F8}

  /* 셰이더 배경 = 로그인 화면 #fff 를 대체 */
  #shader{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:0}

  /* 로그인 도입 화면 목업 (index.html #login 계승) */
  .stage{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px}
  .login-card{
    background:rgba(255,255,255,.72);              /* --surface */
    -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.6);         /* --glass-border */
    border-radius:24px;                            /* --radius-xl */
    padding:48px 44px;text-align:center;min-width:320px;
    box-shadow:0 8px 32px rgba(74,77,231,.08),0 2px 8px rgba(0,0,0,.04); /* --glass-shadow */
    animation:fadeUp .5s ease;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .login-welcome{font-family:Georgia,'Times New Roman',serif;font-size:42px;font-weight:400;color:#4A4DE7;letter-spacing:4px;margin-bottom:24px} /* 실앱은 ClassyVogue */
  .login-sub{font-size:13px;color:#888;margin-bottom:32px}
  .acct{display:flex;gap:8px;justify-content:center;margin-top:8px}
  .acct button{font-size:13px;padding:11px 18px;border-radius:10px;border:1px solid rgba(0,0,0,.09);background:#fff;color:#1A1A2E;cursor:pointer}
  .acct button.primary{background:#4A4DE7;border-color:#4A4DE7;color:#fff}
  .hint{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:2;font-size:12px;color:#6B6B7B;pointer-events:none}

  /* 컨트롤 패널 (시안 전용 — 실제 앱엔 없음) */
  .panel{position:fixed;left:14px;bottom:14px;z-index:3;background:rgba(255,255,255,.82);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.6);border-radius:16px;padding:14px 16px;box-shadow:0 8px 32px rgba(74,77,231,.08),0 2px 8px rgba(0,0,0,.04);font-size:12px;width:250px}
  .panel h4{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:#888;margin-bottom:10px}
  .row{margin-bottom:11px}
  .row label{display:flex;justify-content:space-between;color:#6B6B7B;margin-bottom:5px;font-size:11px}
  .row input[type=range]{width:100%;accent-color:#4A4DE7}
  .segs{display:flex;gap:6px}
  .segs button{flex:1;font-size:11px;padding:7px 4px;border-radius:10px;border:1px solid rgba(0,0,0,.09);background:#fff;color:#6B6B7B;cursor:pointer}
  .segs button.on{background:#4A4DE7;border-color:#4A4DE7;color:#fff}
  .val{color:#4A4DE7;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<canvas id="shader"></canvas>

<div class="hint">셰이더 배경 · 로그인 도입 시안 — 배경 색은 전부 <b>예울마루 브랜드 토큰</b>(인디고·살몬·라이트). 왼쪽 아래에서 조절해봐.</div>

<div class="stage">
  <div class="login-card">
    <div class="login-welcome">YEULMARU</div>
    <div class="login-sub">예울마루 홍보 계획표에 오신 걸 환영해요</div>
    <div class="acct">
      <button class="primary">Microsoft 계정으로 시작</button>
    </div>
  </div>
</div>

<div class="panel">
  <h4>배경 셰이더 조절</h4>
  <div class="row">
    <label>색 프리셋</label>
    <div class="segs" id="presetSeg">
      <button data-p="0" class="on">은은(라이트)</button>
      <button data-p="1">브랜드 강조</button>
    </div>
  </div>
  <div class="row">
    <label>흐름 세기 <span class="val" id="vDist">0.35</span></label>
    <input type="range" id="dist" min="0" max="1" step="0.01" value="0.35">
  </div>
  <div class="row">
    <label>속도 <span class="val" id="vSpeed">0.35</span></label>
    <input type="range" id="speed" min="0" max="1" step="0.01" value="0.35">
  </div>
  <div class="row" style="margin-bottom:0">
    <label>부드러움 <span class="val" id="vSoft">0.55</span></label>
    <input type="range" id="soft" min="0.2" max="1" step="0.01" value="0.55">
  </div>
</div>

<script>
/* ── WebGL mesh-gradient 셰이더 (paper MeshGradient 느낌 자작·의존성 0) ── */
const cv = document.getElementById('shader');
const gl = cv.getContext('webgl');

const VERT = `attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
const FRAG = `
precision highp float;
uniform vec2  u_res;
uniform float u_time;
uniform float u_dist;   // 흐름 세기(도메인 워프)
uniform float u_soft;   // 블롭 부드러움
uniform vec3  u_c0,u_c1,u_c2,u_c3,u_c4; // 브랜드 토큰 색

// value noise + fbm
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
  vec2 u=f*f*(3.-2.*f);
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.02;a*=.5;}return v;}

vec3 blend(vec2 uv,float t){
  float k=mix(2.2,5.5,u_soft);          // 큰 값=또렷, 작은 값=넓게 번짐
  // 천천히 도는 색 중심 5개
  vec2 p0=vec2(.5)+.30*vec2(sin(t*.31),cos(t*.27));
  vec2 p1=vec2(.5)+.34*vec2(cos(t*.23+1.),sin(t*.29+2.));
  vec2 p2=vec2(.5)+.32*vec2(sin(t*.19+3.),cos(t*.21+1.));
  vec2 p3=vec2(.5)+.36*vec2(cos(t*.17+4.),sin(t*.25+.5));
  vec2 p4=vec2(.5)+.28*vec2(sin(t*.13+2.),cos(t*.15+3.));
  float w0=exp(-dot(uv-p0,uv-p0)*k);
  float w1=exp(-dot(uv-p1,uv-p1)*k);
  float w2=exp(-dot(uv-p2,uv-p2)*k);
  float w3=exp(-dot(uv-p3,uv-p3)*k);
  float w4=exp(-dot(uv-p4,uv-p4)*k);
  float ws=w0+w1+w2+w3+w4+1e-4;
  return (w0*u_c0+w1*u_c1+w2*u_c2+w3*u_c3+w4*u_c4)/ws;
}

void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  uv.x*=u_res.x/u_res.y;                 // 종횡비 보정
  float t=u_time;
  // 도메인 워프 = 유체 같은 흐름
  vec2 w=vec2(fbm(uv*2.3+t*.10), fbm(uv*2.3-t*.12+7.));
  uv+=u_dist*0.22*(w-0.5);
  vec3 col=blend(uv,t*0.6);
  col+=(fbm(gl_FragCoord.xy*0.9)-0.5)*0.012; // 아주 미세한 그레인
  gl_FragColor=vec4(col,1.);
}`;

function sh(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));return s;}
const prog=gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));
gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));
gl.linkProgram(prog);gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const loc=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const U=n=>gl.getUniformLocation(prog,n);
const uRes=U('u_res'),uTime=U('u_time'),uDist=U('u_dist'),uSoft=U('u_soft');
const uC=[U('u_c0'),U('u_c1'),U('u_c2'),U('u_c3'),U('u_c4')];

const hex=h=>[parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255];
// 프리셋 색 = 전부 index.html :root 토큰 값
const PRESETS=[
  // 0) 은은(라이트) — --bg 3스톱 + peach-light + accent-light. 현 로그인 톤과 한 몸.
  ['#FDF6F3','#F0EBF5','#EBF0F8','#FBF0EC','#E8E8FD'],
  // 1) 브랜드 강조 — 라이트 베이스에 --accent(인디고)·--peach(살몬틴트)·--peach-text 포인트
  ['#EBF0F8','#E8E8FD','#4A4DE7','#F0C4B8','#D88455']
];

let preset=0, dist=0.35, speed=0.35, soft=0.55;
function pushColors(){PRESETS[preset].forEach((h,i)=>gl.uniform3fv(uC[i],hex(h)));}
pushColors();

function resize(){const d=Math.min(window.devicePixelRatio||1,2);
  cv.width=innerWidth*d;cv.height=innerHeight*d;gl.viewport(0,0,cv.width,cv.height);}
addEventListener('resize',resize);resize();

const t0=performance.now();
function frame(now){
  gl.uniform2f(uRes,cv.width,cv.height);
  gl.uniform1f(uTime,(now-t0)/1000*speed*1.6);
  gl.uniform1f(uDist,dist);
  gl.uniform1f(uSoft,soft);
  gl.drawArrays(gl.TRIANGLES,0,3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// 컨트롤
const bind=(id,setter,vid)=>{const el=document.getElementById(id);el.oninput=()=>{setter(+el.value);document.getElementById(vid).textContent=(+el.value).toFixed(2);};};
bind('dist',v=>dist=v,'vDist');
bind('speed',v=>speed=v,'vSpeed');
bind('soft',v=>soft=v,'vSoft');
document.querySelectorAll('#presetSeg button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#presetSeg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');preset=+b.dataset.p;pushColors();});
</script>
</body>
</html>
