<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>YM 캘린더 아이콘 · 배경 조절</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Malgun Gothic',sans-serif;background:#F0EBF5;color:#1A1A2E;padding:30px 20px 60px;display:flex;flex-direction:column;align-items:center;gap:24px}
h1{font-size:19px;font-weight:800}.sub{font-size:12px;color:#888;margin-top:-16px}
.stage{width:300px;height:300px;display:grid;place-items:center;border-radius:64px;transition:background .2s,border-radius .2s;position:relative;overflow:hidden}
.stage.ckbd{background-image:linear-gradient(45deg,#ddd 25%,transparent 25%),linear-gradient(-45deg,#ddd 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ddd 75%),linear-gradient(-45deg,transparent 75%,#ddd 75%);background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0}
.calicon{width:200px;height:200px;filter:drop-shadow(0 12px 22px rgba(0,0,0,.18))}
.row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:640px}
.sw{width:46px;height:46px;border-radius:12px;border:2px solid rgba(0,0,0,.08);cursor:pointer;position:relative;transition:transform .12s}
.sw:hover{transform:scale(1.08)}.sw.on{border-color:#4A4DE7;box-shadow:0 0 0 3px rgba(74,77,231,.2)}
.sw span{position:absolute;bottom:-17px;left:50%;transform:translateX(-50%);font-size:9px;color:#888;white-space:nowrap}
.panel{background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:18px;padding:18px 20px;display:flex;flex-direction:column;gap:16px;width:min(680px,94vw);box-shadow:0 6px 20px rgba(0,0,0,.05)}
.panel h4{font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:#888;margin-bottom:8px}
.ctl{display:flex;align-items:center;gap:12px;font-size:12px;color:#555}
.ctl input[type=range]{flex:1;accent-color:#4A4DE7}
.ctl input[type=color]{width:44px;height:32px;border:1px solid #ddd;border-radius:8px;background:none;cursor:pointer}
.val{color:#4A4DE7;font-variant-numeric:tabular-nums;min-width:46px;text-align:right}
.note{font-size:11px;color:#6B6B7B;text-align:center;max-width:600px;line-height:1.5}
.note b{color:#4A4DE7}
</style></head><body>
<h1>YM 캘린더 아이콘 · 배경 조절</h1>
<div class="sub">배경판 색을 골라봐 — 정한 값 알려주면 그걸로 앱아이콘/파비콘/OG 다 뽑을게</div>
<div class="stage ckbd" id="stage"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="calicon">
  <defs>
    <!-- 코발트 종이 면 (accent 명도 변주) -->
    <linearGradient id="paper" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#5E61EE"/>
      <stop offset="0.5" stop-color="#4A4DE7"/>
      <stop offset="1" stop-color="#3F42DC"/>
    </linearGradient>
    <!-- 살몬 상단 띠 (peach-text 명도 변주) -->
    <linearGradient id="band" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#E29A6E"/>
      <stop offset="1" stop-color="#D88455"/>
    </linearGradient>
    <!-- 뒤 페이지 (명도 낮춰 겹침 대비) -->
    <linearGradient id="back" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E31A8"/>
      <stop offset="1" stop-color="#252892"/>
    </linearGradient>
    <linearGradient id="back2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B3EC6"/>
      <stop offset="1" stop-color="#3134B4"/>
    </linearGradient>
    <!-- 금속 링 -->
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0F0F4"/>
      <stop offset="0.5" stop-color="#B9B9C4"/>
      <stop offset="1" stop-color="#8A8A96"/>
    </linearGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#2b2f66" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 살짝 틸트된 캘린더 그룹 -->
  <g transform="translate(256 268) rotate(-7) translate(-256 -268)">
    <!-- 뒤 페이지 스택 (어긋남) -->
    <g filter="url(#drop)">
      <path d="M150 150 h250 a26 26 0 0 1 26 26 v230 a26 26 0 0 1 -26 26 h-250 a26 26 0 0 1 -26 -26 v-230 a26 26 0 0 1 26 -26 z"
            fill="url(#back)" transform="translate(26 30)"/>
      <!-- 뒤장1 상단 밝은 엣지(층 구분) -->
      <path d="M150 150 h250 a26 26 0 0 1 26 26 v12 h-302 v-12 a26 26 0 0 1 26 -26 z" fill="#4A4EDC" transform="translate(26 30)" opacity="0.7"/>
      <path d="M144 144 h250 a26 26 0 0 1 26 26 v230 a26 26 0 0 1 -26 26 h-250 a26 26 0 0 1 -26 -26 v-230 a26 26 0 0 1 26 -26 z"
            fill="url(#back2)" transform="translate(13 15)"/>
      <!-- 뒤장2 상단 밝은 엣지 -->
      <path d="M144 144 h250 a26 26 0 0 1 26 26 v12 h-302 v-12 a26 26 0 0 1 26 -26 z" fill="#585CE8" transform="translate(13 15)" opacity="0.7"/>
    </g>

    <!-- 본체 종이 (코발트) — 약간 아래로 휜 하단 -->
    <path d="M120 138 h250 a28 28 0 0 1 28 28 v210
             q0 20 -20 24 q-129 22 -258 0 q-28 -5 -28 -28 v-206 a28 28 0 0 1 28 -28 z"
          fill="url(#paper)"/>

    <!-- 상단 살몬 띠 -->
    <path d="M120 138 h250 a28 28 0 0 1 28 28 v52 h-306 v-52 a28 28 0 0 1 28 -28 z" fill="url(#band)"/>
    <!-- 유리 광택 -->
    <path d="M120 138 h250 a28 28 0 0 1 28 28 v40 q-153 -18 -306 0 v-40 a28 28 0 0 1 28 -28 z" fill="url(#sheen)"/>

    <!-- YM (흰색, 종이 중앙) -->
    <text x="262" y="330" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
          font-size="132" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-6">YM</text>

    <!-- 금속 나선 링 2개 (띠 위로 관통) -->
    <g stroke="url(#ring)" stroke-width="17" fill="none" stroke-linecap="round">
      <path d="M200 108 q0 -34 30 -34 q30 0 30 34 q0 22 -14 34"/>
      <path d="M300 108 q0 -34 30 -34 q30 0 30 34 q0 22 -14 34"/>
    </g>
    <!-- 링 앞쪽(띠 앞) 하이라이트 -->
    <g stroke="#DADAE2" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.8">
      <path d="M204 108 q0 -30 26 -30"/>
      <path d="M304 108 q0 -30 26 -30"/>
    </g>
  </g>
</svg>
</div>
<div class="panel">
  <div>
    <h4>팔레트 프리셋 (아이콘과 어울리는 브랜드색)</h4>
    <div class="row" id="presets"></div>
  </div>
  <div class="ctl"><span>커스텀</span><input type="color" id="cpick" value="#5B8DEF"><input type="range" id="alpha" min="0" max="100" value="100"><span class="val" id="av">100%</span></div>
  <div class="ctl"><span>모서리</span><input type="range" id="rad" min="0" max="150" value="64"><span class="val" id="rv">64</span></div>
  <div class="ctl"><span>아이콘 크기</span><input type="range" id="sz" min="120" max="260" value="200"><span class="val" id="sv">200</span></div>
</div>
<div class="note">💡 iOS/안드로이드 앱아이콘·PWA는 <b>불투명 배경판</b>이 필요해(투명이면 흰/검 배경에 얹힘). 파비콘·OG도 배경 있는 게 선명해. 마음에 드는 배경색 정해줘.</div>
<script>
var PRE=[
 ['#4A4DE7','코발트'],['#E8E8FD','연보라'],['#5457EA','코발트+'],['#3F42DC','코발트-'],
 ['#D88455','살몬'],['#F0C4B8','피치'],['#FBF0EC','피치라이트'],['#FDF6F3','피치bg'],
 ['#1A1A2E','다크'],['#EEEDF3','뉴트럴'],['#ffffff','화이트'],['linear-gradient(135deg,#FDF6F3,#F0EBF5 50%,#EBF0F8)','앱배경'],
 ['transparent','투명']
];
var stage=document.getElementById('stage'),presets=document.getElementById('presets');
function setBg(v,el){ stage.classList.toggle('ckbd', v==='transparent'); stage.style.background = v==='transparent'?'':v; document.querySelectorAll('.sw').forEach(function(s){s.classList.remove('on')}); if(el)el.classList.add('on'); }
PRE.forEach(function(p){ var d=document.createElement('div'); d.className='sw'; d.style.background=p[0]; if(p[0]==='transparent'){d.classList.add('ckbd');} d.innerHTML='<span>'+p[1]+'</span>'; d.onclick=function(){setBg(p[0],d)}; presets.appendChild(d); });
document.getElementById('cpick').oninput=function(){ var a=+document.getElementById('alpha').value; setBg(hexA(this.value,a),null); };
document.getElementById('alpha').oninput=function(){ document.getElementById('av').textContent=this.value+'%'; setBg(hexA(document.getElementById('cpick').value,+this.value),null); };
function hexA(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+(a/100)+')';}
document.getElementById('rad').oninput=function(){document.getElementById('rv').textContent=this.value;stage.style.borderRadius=this.value+'px';};
document.getElementById('sz').oninput=function(){document.getElementById('sv').textContent=this.value;document.querySelector('.calicon').style.width=this.value+'px';document.querySelector('.calicon').style.height=this.value+'px';};
setBg('#4A4DE7',presets.children[0]);
</script></body></html>
