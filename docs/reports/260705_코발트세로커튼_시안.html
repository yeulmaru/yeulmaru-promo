<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>코발트 세로 빛커튼 · 로그인 시안 — 예울마루</title>
<style>
  /* 시안(docs/reports) — 색 탐색용. 확정 색만 index.html :root 토큰으로 갱신 편입(3점 세트). */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Malgun Gothic',sans-serif;color:#fff;overflow:hidden;background:#0a1030}
  #bg{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:0}
  .stage{position:relative;z-index:1;height:100%;display:flex;align-items:center;justify-content:center}
  /* 거의 투명한 유리 카드 (첨부 luminous gradient 톤) */
  .card{background:rgba(255,255,255,.06);-webkit-backdrop-filter:blur(16px) saturate(1.4);backdrop-filter:blur(16px) saturate(1.4);border:1px solid rgba(255,255,255,.6);border-radius:24px;padding:44px 40px;text-align:center;min-width:330px;box-shadow:0 20px 56px rgba(10,16,48,.4)}
  .logo{font-size:25px;font-weight:800;color:#fff;opacity:.25;letter-spacing:.5px;margin-bottom:22px;white-space:nowrap}
  .logo .thin{font-weight:400}
  .sub{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:28px}
  .msbtn{width:100%;padding:12px;background:#fff;border:0;border-radius:12px;font-size:14px;font-weight:600;color:#444;cursor:pointer}
  .panel{position:fixed;left:14px;bottom:14px;z-index:3;background:rgba(255,255,255,.1);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:14px 16px;font-size:12px;width:270px;color:#fff}
  .panel h4{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:10px}
  .row{margin-bottom:11px}
  .row label{display:flex;justify-content:space-between;color:rgba(255,255,255,.75);margin-bottom:5px;font-size:11px}
  .row input[type=range]{width:100%;accent-color:#fff}
  .segs{display:flex;gap:6px;flex-wrap:wrap}
  .segs button{flex:1;min-width:76px;font-size:11px;padding:8px 4px;border-radius:10px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;cursor:pointer}
  .segs button.on{background:#fff;color:#1a1a2e;border-color:#fff}
  .val{color:#fff;font-variant-numeric:tabular-nums}
  .swatch{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px;border:1px solid rgba(255,255,255,.4)}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="stage">
  <div class="card">
    <div class="logo"><b>GS</b> <span class="thin">Caltex</span> <b>YEULMARU</b></div>
    <div class="sub">예울마루 홍보 계획표에 오신 걸 환영해요</div>
    <button class="msbtn">Microsoft 계정으로 로그인</button>
  </div>
</div>

<div class="panel">
  <h4>코발트 세로 빛커튼</h4>
  <div class="row">
    <label>색 프리셋 (mid = 메인 후보)</label>
    <div class="segs" id="seg">
      <button data-p="0" class="on"><span class="swatch" style="background:#2B54E8"></span>로열 2B54E8</button>
      <button data-p="1"><span class="swatch" style="background:#1E50FF"></span>비비드 1E50FF</button>
      <button data-p="2"><span class="swatch" style="background:#2563EB"></span>소프트 2563EB</button>
      <button data-p="3"><span class="swatch" style="background:#3A3DD8"></span>인디고끼 3A3DD8</button>
    </div>
  </div>
  <div class="row"><label>세로 커튼 세기 <span class="val" id="vS">0.70</span></label><input type="range" id="streak" min="0" max="1" step="0.01" value="0.7"></div>
  <div class="row"><label>흐름 속도 <span class="val" id="vSp">0.40</span></label><input type="range" id="speed" min="0" max="1" step="0.01" value="0.4"></div>
  <div class="row" style="margin-bottom:0"><label>밝기 <span class="val" id="vB">0.55</span></label><input type="range" id="bright" min="0.2" max="1" step="0.01" value="0.55"></div>
</div>

<script>
const cv=document.getElementById('bg');
const gl=cv.getContext('webgl');

const VERT='attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
const FRAG=`precision highp float;
uniform vec2 u_res;uniform float u_time;
uniform vec3 u_dark,u_mid,u_bright;
uniform float u_streak,u_brightness;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));vec2 u=f*f*(3.-2.*f);return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.03;a*=.5;}return v;}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float asp=u_res.x/u_res.y;
  float t=u_time;
  // 세로 방향 흐름 도메인 워프 (커튼처럼 위→아래로 부드럽게 이동)
  vec2 q=vec2(uv.x*asp, uv.y);
  float flow=fbm(vec2(q.x*1.6, q.y*1.1 - t*0.6));
  q.x += 0.18*(fbm(vec2(q.x*2.2, q.y*1.4 - t*0.4))-0.5);
  // 큰 코발트 유동 덩어리 (밝은 영역)
  float glow=fbm(vec2(q.x*1.8+3.0, q.y*1.3 - t*0.9));
  glow=smoothstep(0.25,0.95,glow);
  // 세로 빛 커튼 스트리크: x 고주파를 flow로 변조 → 세로 줄들이 흐름
  float sPhase=q.x*46.0 + flow*10.0 + fbm(vec2(q.x*8.0, q.y*0.8 - t))*7.0;
  float streak=0.5+0.5*sin(sPhase);
  streak=pow(streak,2.2);
  // 세로로 긴 감쇠 (위/아래 은은)
  float vfade=0.5+0.5*sin(uv.y*3.14159 + fbm(q*2.0+t*0.3)*2.0);
  // 합성: 다크 베이스 → 코발트 mid(glow) → 밝은 스트리크
  vec3 col=mix(u_dark, u_mid, glow);
  float streakAmt=u_streak*streak*mix(0.35,1.0,glow)*mix(0.6,1.0,vfade);
  col += u_bright * streakAmt * u_brightness;
  // 중앙 밝은 코어 살짝
  col += u_mid * glow*glow * 0.25 * u_brightness;
  col += (fbm(gl_FragCoord.xy*0.9)-0.5)*0.015; // 미세 그레인
  gl_FragColor=vec4(col,1.0);
}`;

function sh(t,s){const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);if(!gl.getShaderParameter(x,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(x));return x;}
const prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(prog);gl.useProgram(prog);
const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const lp=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(lp);gl.vertexAttribPointer(lp,2,gl.FLOAT,false,0,0);
const U=n=>gl.getUniformLocation(prog,n);
const uRes=U('u_res'),uTime=U('u_time'),uDark=U('u_dark'),uMid=U('u_mid'),uBright=U('u_bright'),uStreak=U('u_streak'),uBr=U('u_brightness');
const hx=h=>[parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255];

// 프리셋: [dark 베이스, mid=메인 강조색 후보, bright 하이라이트]
const PRE=[
  ['#0A1330','#2B54E8','#8AA6FF'],
  ['#08103A','#1E50FF','#7E9CFF'],
  ['#0C1738','#2563EB','#93B4FF'],
  ['#0C0F35','#3A3DD8','#9A9DF5']
];
let preset=0,streakV=0.7,speed=0.4,bright=0.55;
function pushCol(){const P=PRE[preset];gl.uniform3fv(uDark,hx(P[0]));gl.uniform3fv(uMid,hx(P[1]));gl.uniform3fv(uBright,hx(P[2]));}
pushCol();
function resize(){const d=Math.min(devicePixelRatio||1,2);cv.width=innerWidth*d;cv.height=innerHeight*d;gl.viewport(0,0,cv.width,cv.height);}
addEventListener('resize',resize);resize();
const t0=performance.now();
function frame(now){
  gl.uniform2f(uRes,cv.width,cv.height);
  gl.uniform1f(uTime,(now-t0)/1000*speed*1.5);
  gl.uniform1f(uStreak,streakV);gl.uniform1f(uBr,bright);
  gl.drawArrays(gl.TRIANGLES,0,3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
const bind=(id,set,vid)=>{const e=document.getElementById(id);e.oninput=()=>{set(+e.value);document.getElementById(vid).textContent=(+e.value).toFixed(2);};};
bind('streak',v=>streakV=v,'vS');bind('speed',v=>speed=v,'vSp');bind('bright',v=>bright=v,'vB');
document.querySelectorAll('#seg button').forEach(x=>x.onclick=()=>{document.querySelectorAll('#seg button').forEach(y=>y.classList.remove('on'));x.classList.add('on');preset=+x.dataset.p;pushCol();});
</script>
</body>
</html>
