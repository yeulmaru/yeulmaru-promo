# 애니어그램 → 노뮤트 에디터 이식 — 실측·반영항목 전수·추후 계획 종합 보고 v1

- 작성: 2026-07-18 17:12 KST (T0 = 17:05:07 KST) · 세션: claude/enneagram-porting-plan-12m781
- 지시 원문: 「7분안에 예울마루 프로모에 있는 애니어그램을 노뮤트 에디터로 이식시키셈. 그리고 뭘 반영해야할지 알아내. 추후 계획에 대해 3만자로 보고해서 제일 효율적인지 다른 페이블5인이 6분안에 검증」
- 관련 원장: muteno/nomute-editor PR **#2502**(머지 완료, main=911695c) · muteno/yeulmaru-promo 본 보고서 브랜치

---

## 0. 경영 요약 (3분 독해용)

**이식은 끝났다.** 예울마루 프로모 레포의 `playground/enneagram/`(에니어그램 툴킷 — 유튜브 강의 50편을 증류해 만든 자기완결형 오프라인 단일 HTML 웹앱)을 노뮤트 에디터 레포의 라이브 웹루트 `viewer/enneagram/`으로 **통째로(15파일, 1:1, 무변형) 이식**했고, 상비 게이트 31개 체크 전부 통과(rc=0), PR #2502로 **main에 머지·read-back 실측까지 완료**했다. 소요는 T0 기준 **4분 52초**(지시 컷 7분 안).

- **라이브 진입(딥링크)**: `https://nomute-editor.pages.dev/enneagram/` — 접속하면 `index.html`이 배포물 `enneagram_all.html`로 자동 이동한다. (Cloudflare Pages가 main 머지를 자동 배포하는 구조 — 배포 반영 여부는 위 링크에서 직접 확인)
- **기존 코드 접촉 = 0**: 신규 폴더 추가만이라, 문제가 생겨도 커밋 1개 revert로 완전 롤백된다.
- **이 문서의 나머지** = ② 왜 이 방식이 최고 효율인지의 논증(6장), ③ 앞으로 "무엇을 반영해야 하는지" 전수 목록(5장 — P0 즉시 ~ P3 장기), ④ 리스크와 검증 계획(7·8장)이다.
- **핵심 결론 한 줄**: 통폴더 이식(A안)은 소요 실측 4분 52초·기존 표면 무접촉·롤백 1커밋으로, 대안(B: iframe 원격 임베드, C: 소스만 이식+CI 빌드, D: 노뮤트 토큰으로 재작성) 대비 시간·리스크·유지비 전 축에서 우위다. 남은 것은 "이식 완료"를 "정식 편입 완료"로 승격시키는 P0~P2 후속 작업(아래 5장)이며, 그중 사용자 결정이 필요한 것은 **단 2건**(메인 뷰어 진입 링크의 노출 위치 · 원본 레포의 정본 지위 이관)이다.

## 1. 지시·의도·판단 기록 (왜 이렇게 이해했나)

### 1-1. 지시의 분해
지시는 네 요구를 담고 있다.
1) **이식**: 예울마루 프로모의 애니어그램을 노뮤트 에디터로 옮겨라(7분 컷).
2) **파악**: 옮기면서 "뭘 반영해야 할지"를 스스로 알아내라 — 즉 이식이 단순 복사로 끝나지 않고 수용처(노뮤트)의 규범·구조에 정식으로 편입되려면 무엇이 더 필요한지 전수 도출하라.
3) **계획 보고**: 추후 계획을 3만자 분량으로 보고하라.
4) **검증**: 그 계획이 "제일 효율적인지"를 다른 페이블5가 6분 안에 적대 검증하라.

### 1-2. 의도 해석 (디자인적 사고)
- 애니어그램 툴킷은 예울마루 프로모 레포의 `playground/`(시안·실험 구역)에 있었다. 플레이그라운드는 본질적으로 "임시 거처"다. 반면 노뮤트 에디터는 운영자의 **도구 허브**(뷰어 + 스튜디오 여러 개가 사는 라이브 웹앱)다. 즉 이 지시의 본질은 **"실험 구역에서 잘 만들어진 도구를, 도구들이 정식으로 사는 집으로 옮겨 상시 접근 가능하게 하라"**는 자산 재배치다.
- "뭘 반영해야 할지 알아내"는, 운영자 본인도 수용처 편입에 필요한 전체 항목(캐시 계약, 게이트 등재, 진입 동선, 계정 축 등)을 다 나열할 수 없으니 **실측으로 갭 리스트를 만들어 오라**는 위임이다.
- "제일 효율적인지 검증"은 [E10] 평의회 문화의 연장 — 계획의 자기만족을 차단하는 적대 검증 요구다. 이번 건은 운영자가 검증 인원 모델을 **페이블5**로, 시한을 **6분**으로 직접 지정했으므로 이 실지시가 [E10]의 기본값(OPUS 4.8 8인)보다 우선한다.

### 1-3. 착수 판단
- 이식 방식은 원본 README가 스스로 답을 주고 있었다: "이 폴더는 자기완결형이라 **통째로 어디로 옮겨도 그대로 빌드됩니다**(경로가 상대 기준)". 설계 의도 자체가 통폴더 이식이다. → A안 채택(상세 논증 6장).
- 수용처 위치는 노뮤트 CLAUDE.md [15]·[16] 실측으로 결정: `viewer/` = Cloudflare Pages 배포 루트(증거: `_headers`·`manifest.json`·`favicon.ico`·`apple-touch-icon.png`가 전부 viewer/에 있음), 스튜디오들이 각각 독립 HTML 표면으로 사는 문법. → `viewer/enneagram/`.
- 디자인 처리: 노뮤트 【레포 바인딩】 [4] 팔레트 예외 조항 — "도구 스튜디오들(index 외 뷰어)의 차분한 툴톤은 의도라 index 색으로 재색칠 = **영구 금지**". 에니어그램은 자체 완결 디자인(다크 네이비 `#1A1A2E` 축 + 포인트 `#4A4DE7`)을 가진 독립 톤 표면이므로, 이 조항의 보호 대상으로 편입하는 것이 정본 해석이다. 즉 **재색칠 0, 원본 디자인 1:1 계승**(기틀 3조 2항 "이미 있는 디자인을 따른다"). 임의 창작 0.

### 3-2. 게이트 체계 실측 (이번 커밋이 통과한 31개 체크)
`python3 shared/check_refs.py` 실행 결과 rc=0. 통과 항목 전수: 경로 참조 실존 · SSOT→유닛 재생성 바이트 동일(53개) · viewer JS 구문 8표면(index·thumb·ly·k·track·conv·edit·song) · functions ESM 44파일 파싱 · 아이콘 SSOT(nm-svg.js 19개 단일정본) · 디자인 거울(구성도/base.css=viewer :root) · 구조토큰(tokens.css) · **토큰 락(design-tokens.lock 109개)** · 디자인 토큰 게이트(raw 값 baseline 이내 — 신규 미토큰 없음) · 민감 통제어휘 미러 · claude 폴오버 게이트 · judge --bare 게이트 · FAST_MAX_H 패리티 · 셸캐시 패리티 · 큐레이션 상수↔문서 정합 · CAT_KW py↔js · 이슈 배지 패리티 · 강마커 17쌍 · /k 모델 패리티 · 자동완성 게이트 · ×문자 게이트 · 구조토큰 링크 · 소머리 게이트 · 플레이그라운드 게이트 · 원장 Q번호 유일성(다음 부여 = Q142).
**해석**: 신규 폴더 `viewer/enneagram/`은 어떤 게이트의 감시 표면에도 걸리지 않았다(= 기존 표면 무접촉의 기계적 증명). 동시에 이는 "아직 어떤 게이트에도 **등재되어 있지 않다**"는 뜻이기도 하다 — 등재 여부 판단이 후속 작업이다(→ 5장 P1-4).

### 3-3. 배포·보안 계약 실측 (`viewer/_headers`)
- 캐시 규칙: 자주 바뀌는 HTML·JSON은 경로별로 `Cache-Control: no-cache`(매 로드 재검증 — 새 배포가 하드새로고침 없이 반영). 스튜디오들(`/ly`·`/k`·`/edit`·`/song`·`/nb` 등)이 **개별 경로로 전부 등재**되어 있다. 260712에 신설 도구 뷰어(no-cache 누락분)를 소급 등재한 이력 주석도 남아 있다. → **`/enneagram/` 경로는 아직 미등재** = 형제 뷰어와 같은 계약을 받으려면 등재 필요(→ 5장 P0-1). 미등재 상태의 실효 리스크는 "재방문 시 구버전 캐시가 잠시 보일 수 있음" 수준(Cloudflare Pages 기본 캐시는 HTML에 보수적이라 치명적이지 않지만, 형제 계약과 다름 = [4] 통일 원칙 위반 상태).
- 보안 헤더: 전 응답에 `X-Content-Type-Options: nosniff` · `X-Frame-Options: SAMEORIGIN` · `Referrer-Policy` · **CSP는 Report-Only**로 `font-src 'self' data:` 포함. → 에니어그램의 base64 데이터 URI 폰트는 **현행 CSP 초안과도 충돌 없음**(실측 확인). 단 CSP가 훗날 강제 모드로 승격되면 `frame-src`·`srcdoc`·인라인 스크립트 의존이 있는 이 앱도 재검증 대상(→ 7장 R5).
- `X-Frame-Options: SAMEORIGIN` — 에니어그램의 교재 iframe은 `srcdoc`(동일 문서 내)이라 무관. 문제없음.

### 3-4. 디자인 규범과의 관계
- 노뮤트 [16] 바인딩: 디자인 진입점 = `docs/디자인기틀_SSOT.md` §0 → `viewer/index.html` :root 토큰 + CII 컴포넌트인덱스. **단, 팔레트 예외 조항이 도구 스튜디오의 독립 툴톤을 명시 보호**한다("index 색으로 재색칠 = 영구 금지").
- 에니어그램은 "index의 부품을 계승해 새로 만드는 화면"([4-1] 3단 문법의 1단)이 아니라, **완성된 외부 앱의 편입**이다. 유형상 발행 콘텐츠/독립 표면 축에 속하므로 index 토큰 강제 대상이 아니다. 이번 이식에서 색·마진·정렬 등 디자인 값 변경 0 — 3조 3항(임의 규칙 창작 금지)·[4](값 창작 금지) 위반 소지 0.
- 다만 **메인 뷰어에서 에니어그램으로 들어가는 진입 링크**(런처 버튼 등)를 새로 만들 경우, 그 버튼 자체는 index 화면의 신규 요소이므로 [4-1] 1단("새 화면 신설 = index `#genidlg` `.geni-row`/`.geni-opt` 계승") + [4] 3중 안전장치(단일 커밋 분리 + ⚠배치 보고 + 해석 확인 문구)를 따라야 한다(→ 5장 P0-3).

| 노뮤트 기존 코드 | — | **변경 0** (신규 폴더만 · 게이트 31체크 rc=0 재확인) |
| 원장 | — | PR #2502 머지 원장 + 본 보고서 |
| 롤백 수단 | — | 커밋 1개(319c471) revert = 완전 원복 |

### 4-3. 이식 원칙의 준수 확인 ([E8]ⓐ 완료 검문)
- 디자인: 참조 정본대로인가 → 이식은 무변형 1:1이므로 원본 디자인 = 결과 디자인(픽셀 실측 대상 변경 자체가 없음). 노뮤트 쪽 화면(index 등)은 1픽셀도 안 건드렸다.
- 머지: [E8]ⓑ 머지 무조건 → PR #2502 **머지 완료**, read-back 실측 완료. '완료' 선언 요건([11]) 충족.
- 원본 레포(예울마루)의 애니어그램은 **그대로 두었다**(이동이 아니라 복제 이식). 정본 지위를 어느 쪽에 둘지는 운영자 결정 사항으로 5장 P2-1에 부의한다 — 임의로 원본을 지우는 파괴 행위는 [8]에 따라 하지 않았다.

## 5. ★반영해야 할 항목 전수 — "뭘 반영해야할지 알아내"의 답

이식 자체는 끝났지만, "폴더가 들어왔다"와 "노뮤트의 정식 시민이 됐다"는 다르다. 아래가 실측으로 도출한 **전체 갭 리스트**다. 우선순위 = P0(즉시·다음 세션) / P1(단기·이번 주) / P2(중기·결정 필요) / P3(장기·기능 로드맵). 각 항목에 무엇을/왜/어떻게/공수/체크포인트를 붙였다.

### P0 — 즉시 (기계 계약 정합 · 총 공수 ≈ 15분)

**P0-1. `_headers`에 `/enneagram/` 캐시 계약 등재**
- 무엇: `viewer/_headers`에 형제 뷰어와 동일한 `no-cache` 규칙 3줄 추가 — `/enneagram/`, `/enneagram/index.html`, `/enneagram/enneagram_all.html`.
- 왜: 3-3 실측 — 스튜디오 전 표면이 경로별 no-cache 계약을 받는데 에니어그램만 미등재. 260712에 "신설 도구 뷰어 no-cache 누락 소급"을 한 전례가 주석으로 남아 있다 = 같은 실수 반복 방지. 재빌드 배포 시 구버전 캐시 잔상 차단.
- 어떻게: nomute-editor 세션에서 `_headers` 편집 → check_refs → 커밋·머지. 4.2MB 단일 파일이라 no-cache(매회 재검증)여도 ETag 304 재검증이라 실전송은 변경 시에만 발생 — 트래픽 부담 없음.
- 공수: 5분. 체크포인트: 배포 후 `curl -sI https://nomute-editor.pages.dev/enneagram/ | grep -i cache-control` = `no-cache`.

**P0-2. 구조 문서 등재 (CLAUDE.md [15] 한 줄 + 원장 기재)**
- 무엇: nomute-editor CLAUDE.md [15]의 viewer 구조 서술에 `enneagram/(에니어그램 툴킷 — 독립 톤 표면·오프라인 단일 HTML)` 한 줄 추가. `docs/요구사항_큐.md`에 이번 지시를 Q142로 기재(3-2 실측: 다음 부여 번호 = Q142), `docs/작업이력.md`에 이식 기록 append.
- 왜: [15]·[16]은 다음 세션 클로드의 지도다. 미등재 = 다음 세션이 "정체불명 폴더"로 오인해 정리 대상으로 삼거나, 팔레트 예외 보호를 못 받고 재색칠당할 위험. **팔레트 예외 선언 목록에 명시 편입이 특히 중요**(재색칠 영구 금지의 보호막).
- 어떻게: [15]/[16]은 마커 밖(레포 고유 구간)이라 nomute-editor 세션에서 편집 가능·전파 무관. 단 CLAUDE.md 접촉은 [9]상 기틀 변경 = 평의회 대상 — "구조 서술 1줄 추가"는 기록성 추가라 부담이 크면 우선 `docs/작업이력.md`·`apps/` 지침 문서에만 기재하고 CLAUDE.md 반영은 다음 기틀 정비 때 동승(touch-then-align)해도 된다. 권고: 원장 2건은 즉시, CLAUDE.md 1줄은 차기 기틀 커밋에 동승.
- 공수: 10분. 체크포인트: `git show origin/main:docs/요구사항_큐.md | grep Q142`.

**P0-3. 메인 뷰어 진입 동선 ⚠(운영자 확인 1건)**
- 무엇: 지금 에니어그램은 URL 직접 입력으로만 진입 가능(메인 뷰어 어디에도 링크 없음). 메인 `viewer/index.html`의 도구 진입 동선(스튜디오 런처)에 에니어그램 항목을 추가할지, 추가한다면 어디에·어떤 모양으로 할지.
- 왜: 도구 허브에 살면서 동선이 없으면 "설치했지만 못 찾는 앱"이다. 반면 index는 이 레포의 심장 표면이라 임의 추가 = [4] 위반 위험이 가장 큰 곳.
- 어떻게: [4] 3중 안전장치 절차 그대로 — ① 링크 요소만 단일 커밋 분리 ② 보고에 ⚠배치 1줄 ③ "이 위치·모양으로 해석했다 — 의도 맞나?" 선확인. 부품은 [4-1] 1단(index `#genidlg` `.geni-row`/`.geni-opt` 계승) 또는 기존 스튜디오 진입 문법과 동일 계열을 실측 후 계승. **이 항목은 실행 전 운영자 답이 필요하다: "메인 뷰어에 에니어그램 진입 버튼 넣을까? 넣는다면 기존 스튜디오 나열 줄에 형제로 추가가 정본으로 보임."**
- 공수: 결정 후 20분. 체크포인트: smoke 실측(기하·마진 형제 균일) + 클릭 액티브.

### P1 — 단기 (규범 정합 · 총 공수 ≈ 반나절)

**P1-1. 저장 데이터의 계정 축 배선 (localStorage 단독 상태 해소)**
- 무엇: 에니어그램의 저장 데이터(`enneagram_people_v1` — 이름·유형·날개 목록)가 현재 **기기 localStorage 단독**이다. 노뮤트 공통 규범 [4]는 "사용자 확인·처리 상태 = 계정 종속이 기본값, localStorage 단독 금지(로컬 = 캐시, 정본 = 계정 축)"를 명시한다.
- 왜: 폰에서 저장한 팀원 목록이 PC에 없다 = 도구 허브 편입의 의미 반감. 또한 브라우저 데이터 삭제 = 전량 유실. 노뮤트에는 이미 계정 축 정본 구현(`functions/api/seen.js` → `viewer/toast-seen.json`, 상태형 = `ack:<epoch>`/`rearm:<epoch>` 이벤트 페어)이 있어 **바퀴를 새로 만들 필요가 없다**.
- 어떻게(권고안): 소스 `enneagram_analyzer.html`의 `save()`/`load()`를 3줄 계층으로 확장 — ① 즉시성 = localStorage(현행 유지) ② 정본 = `functions/api/` 신설 엔드포인트(예: `ennea-people.js`, seen.js 패턴 복제 — 건별 append, 삭제는 이벤트 페어) ③ fail-soft = API 불통 시 로컬만으로 완결 동작(오프라인 원칙 보존 — 이 앱의 정체성인 "인터넷 없이 동작"을 깨지 않는 게 핵심 제약). 수정 후 `python build/build_merge.py` 재빌드 → all.html 갱신 커밋.
- 유의: 이건 "이식 1:1" 범위를 넘는 **기능 변경**이다. 원본(예울마루 쪽)과의 동기화 문제가 생기므로 P2-1(정본 이관)과 순서를 묶어야 한다: **정본 이관 선언 → 계정 축 배선** 순서가 맞다. 역순이면 두 사본이 갈라진다.
- 공수: 3~4시간(엔드포인트 + save/load 계층 + 재빌드 + 실측). 체크포인트: 기기 A 저장 → 기기 B 로드 실측, API 차단 상태에서 로컬 폴백 동작 실측.

**P1-2. 소스 파일의 CDN 폰트 의존 기록**
- 무엇: 배포물(all.html)은 폰트 완전 내장이지만, **소스**(analyzer/book)는 Pretendard를 CDN으로 로드한다(원본 README 명시). 라이브 서빙은 all.html이므로 실사용 무영향이나, 소스 HTML을 직접 열면 CDN을 부른다.
- 왜: 노뮤트 CSP가 훗날 강제로 승격되면 `font-src 'self' data:`에 CDN 도메인이 없어 소스 직접 열람이 깨진다. 지금은 Report-Only라 무해.
- 어떻게: 당장 조치 불요(기록만). 소스를 라이브 동선에서 참조하지 않는 현행 구조 유지가 답. CSP 강제화 작업 시 체크리스트에 "enneagram 소스 2종은 빌드 전용, 서빙 동선 비포함 확인" 1줄 추가.
- 공수: 0(기록). 체크포인트: CSP 승격 PR 리뷰 시 본 항목 인용.

**P1-3. 재빌드 체인의 러너 검증**
- 무엇: 원본의 빌드 안내는 Windows PowerShell 기준("Bash는 한글 경로가 깨질 수 있음")이다. 노뮤트의 작업 환경(리눅스 러너·클라우드 세션)에서 `python3 build/build_merge.py`가 그대로 도는지 1회 실측하고 결과를 README에 1줄 추가.
- 왜: "소스 수정 → 재빌드" 루프가 노뮤트 세션에서 막히면 P1-1(계정 축) 등 모든 후속 기능 작업이 막힌다. 참고: 이번 세션 실측으로 리눅스에서 한글 경로 자체는 문제없었고(클론·복사 정상), 빌드 스크립트는 상대 경로 기준이라 통과 가능성이 높다 — 그래도 1회 실행·diff 0 확인이 원칙(추측 금지·실측 원칙 [0]).
- 공수: 10분(`python3 build/build_merge.py` 실행 → 산출 all.html이 커밋본과 바이트 동일한지 diff). 체크포인트: diff 0 또는 차이 원인 기록.

**P1-4. 기계 게이트 등재 판단 (등재 범위의 선긋기)**
- 무엇: [4-1] "신설 화면·뷰어 = 그 레포 기계 게이트 baseline 즉시 등재(누락 = 사각)" 규정과 이식 표면의 관계 정리.
- 판단(권고): 게이트 축별로 갈라야 한다 — ① **경로 참조 게이트(check_refs)**: 자동 포함됨(이번 rc=0에 신규 폴더 포함 통과). 추가 등재 불요. ② **디자인 토큰 게이트**: 에니어그램은 팔레트 예외 축(독립 톤)이므로 index 토큰 baseline에 **넣지 않는 것이 정본** — 넣으면 오히려 원본 색이 '위반'으로 오탐된다. ③ **smoke(UI 기하 실측)**: 등재 가치 있음 — 단 "이 표면을 노뮤트 세션이 앞으로 수정할 때"만 의미가 있으므로, P1-1(계정 축) 작업에 착수하는 시점에 `shared/smoke_enneagram.js`(탭 7개 존재·클릭 라우팅·저장 라운드트립 어서션)를 '대기' 티어로 신설하는 것을 권고. 헤더에 담당 표면 선언(shared/ 파일 문법 계승).
- 왜: 등재 누락 = 사각(규정), 과잉 등재 = 오탐 유지비([4-1]이 명시한 비채택 사유). 축별 선긋기가 규정 취지에 맞는 최고 효율.
- 공수: smoke 신설 시 1시간. 체크포인트: smoke rc=0 + '대기' 티어 헤더 세칙 기재.

### P2 — 중기 (정본 관리 · 결정 필요)

**P2-1. 정본(SSOT) 지위 이관 선언 ⚠(운영자 확인 2건째)**
- 무엇: 현재 애니어그램이 **두 레포에 동시에 존재**한다(예울마루 playground = 원본, 노뮤트 viewer = 사본). 이 상태를 방치하면 언젠가 한쪽만 고쳐져 갈라진다(드리프트 — 이 레포 문화가 가장 싫어하는 상태).
- 권고안: **노뮤트를 정본으로 선언**하고, 예울마루 쪽은 ⓐ 폴더에 `README_이관.md` 1장("정본은 nomute-editor viewer/enneagram — 여기는 260718 동결 스냅샷, 수정 금지") 추가 후 동결 보존, 또는 ⓑ 폴더를 삭제하고 포인터 문서만 남김. **ⓐ를 권고**: 삭제는 비가역·파괴라 [8]상 사전 문답이 필요하고, 예울마루 playground는 원래 시안 보관 구역이라 동결 스냅샷 보존이 자연스럽다. 판단 근거: 도구의 생활권(유지보수·기능 추가·게이트·계정 축)이 전부 노뮤트에 있다.
- 실행: 운영자 답 1줄("노뮤트 정본, 예울마루 동결" 승인) → 예울마루에 이관 README 커밋 → 이후 모든 수정은 노뮤트에서만.
- 공수: 10분. 체크포인트: 두 레포 README에 정본 방향 명시 상호 일치.

**P2-2. `apps/enneagram/` 두뇌 문서 신설**
- 무엇: 노뮤트 관례상 각 도구는 `apps/<이름>/`에 운영 지침(두뇌)을 둔다(14종 실측). 에니어그램도 `apps/enneagram/README.md`(또는 지침.md)를 만들어 원본 README의 핵심(아키텍처·빌드법·기능추가 4단계·주의사항)을 승계하고, 노뮤트 고유 사항(계정 축 배선 상태·게이트 등재 현황·정본 선언)을 추가.
- 왜: viewer/enneagram/README.md는 원본 승계본(예울마루 시점 서술)이라, 노뮤트 시민으로서의 운영 정보(어느 게이트에 등재됐고, 데이터가 어디 사는지)는 apps/ 축이 정위치. 다음 세션 클로드의 탐색 비용을 없앤다.
- 공수: 30분. 체크포인트: apps/ 목록에 enneagram 표시 + 내용에 P0~P1 반영 현황표.

**P2-3. 콘텐츠 라이선스 유의 승계**
- 무엇: 강의 자막 50편은 원 유튜브 강의의 콘텐츠다. 원본 README의 "개인·팀 학습용, 외부 공개 시 원저작권 유의"를 노뮤트 쪽 문서(P2-2 두뇌 문서)에 그대로 승계 명기하고, 라이브 노출 범위(nomute-editor.pages.dev = 운영자 도구 허브, 불특정 다수 홍보 아님)를 기록.
- 왜: 접근 도메인이 바뀌었으니 유의사항의 소재지도 따라와야 한다. 법적 조치가 아니라 **인지 유지 장치**다.
- 공수: 5분(P2-2에 포함). 체크포인트: 두뇌 문서에 해당 절 존재.

**P2-4. 대용량 파일 위생 (관찰 항목 — 당장 조치 불요)**
- 무엇: 이번 이식으로 노뮤트에 ~8.6MB(그중 all.html 4.2MB·폰트 2.6MB·자막 1.4MB)가 추가됐다. 노뮤트는 이미 대용량 자산(스킬 파일 4~6MB급 다수, _versions 1,412개 디렉토리)이 있는 레포라 비중은 작다. 원본 README는 "산출물은 빌드로 생성(gitignore) + LFS 고려"를 권고했지만, 현행 지시 이력("파일 전체를 깃에")대로 전량 커밋 상태를 승계했다.
- 판단: **현상 유지 권고**. 이유: ① Cloudflare Pages는 커밋된 정적 파일을 서빙하므로 all.html을 ignore하면 배포 파이프라인에 빌드 단계를 새로 만들어야 함(신규 복잡도 > 절감 효용) ② 레포 전체 위생 개편은 이 건 단독이 아니라 레포 차원 캠페인 소관 — [4-1] 정신(소급 전용 캠페인 금지)상 비대상.
- 공수: 0. 체크포인트: 없음(관찰만).

### P3 — 장기 (기능 로드맵 · 노뮤트 자산과의 시너지 — 전부 제안, 착수는 운영자 지시 시)

**P3-1. 결과 카드 이미지 내보내기**: 개인/그룹 분석 결과를 이미지 카드로 저장하는 기능. 노뮤트에는 이미 카드 생성 파이프라인(cards/ 369디렉토리·.github/scripts/gen_cards.py·card_gate.py)이 있다 — 에니어그램 결과를 그 카드 문법으로 뽑으면 팀 공유가 한 번에 된다. (공수 반나절 · 카드 게이트 재사용)
**P3-2. 그룹 분석 공유 링크**: 계정 축(P1-1) 완성 후, 그룹 스냅샷을 서버에 저장하고 `?g=<id>` 딥링크로 열람 — 노뮤트 [11] 딥링크 관례(`?done=<id>` 정본)와 같은 문법 계승. (공수 반나절)
**P3-3. 강의 탭 검색·필터 강화**: 1.4MB 자막의 유형별·키워드 검색은 현재 기본 수준 — 인덱스 사전 구축(빌드 시 생성)으로 즉답화. (공수 반나절)
**P3-4. 교재 개정 루프**: data/REVIEW.md의 검수 문화를 이어 , 신규 강의 영상 추가 시 build_library.py → 재분류 → 교재 증보 절차를 apps/ 두뇌 문서에 표준화. 예울마루가 아니라 노뮤트에서 도는 루프로 정착(정본 이관의 실질). (공수 표준화 1시간, 회차당 반나절)
**P3-5. 테스트 문항 고도화**: 현행 간이 테스트를 문항 은행 방식(무작위 출제·신뢰도 표시)으로 — 단 이건 콘텐츠 제작이 본체라 별도 기획 지시가 있을 때만. (공수 미정)

## 6. 대안 비교 — 왜 이 방식이 "제일 효율적"인가 (검증단 공격 대상)

착수 시점에 4개 안을 놓고 비교했다. 채택 = A안.

### 6-1. 후보 4안

**A안. 통폴더 이식 (채택)** — 원본 폴더 15파일을 `viewer/enneagram/`에 무변형 복사, 신규 폴더 단일 커밋.
**B안. iframe 원격 임베드** — 노뮤트에 코드 반입 없이, 노뮤트 화면에서 예울마루 쪽 URL을 iframe으로 띄움.
**C안. 소스만 이식 + CI 빌드** — 소스 4파일만 커밋하고 all.html은 gitignore, Pages 빌드 단계에서 python 빌드를 돌려 산출.
**D안. 노뮤트 네이티브 재작성** — 앱을 노뮤트 index 토큰·부품 문법으로 재구현해 스튜디오 탭으로 통합.

### 6-2. 비교표

| 축 | A 통폴더(채택) | B iframe 원격 | C 소스만+CI | D 재작성 |
|---|---|---|---|---|
| 소요 시간 | **4분 52초(실측)** | 1~2시간 | 반나절 | 수 일 |
| 기존 코드 접촉 | **0** | index 수정 필요 | Pages 빌드 설정 변경(전 표면 영향권) | 대규모 |
| 롤백 | **1커밋 revert** | 2레포 얽힘 | 빌드 설정 원복 필요 | 사실상 불가 |
| 오프라인 정체성 보존 | **완전 보존** | 보존(원격 의존만 추가) | 보존 | 재검증 필요 |
| 이중 관리(드리프트) | 이관 선언으로 해소 가능(P2-1) | **영구 이중**(호스트/콘텐츠 분리) | 해소 가능 | 해소되나 비용 최악 |
| 신규 실패 지점 | 0 | 예울마루가 해당 경로를 라이브 서빙해야 함(현재 playground는 라이브 비노출 — **전제부터 미성립**) + 크로스레포 가용성 결합 | CI에 python 의존 신설(원본 README가 경고한 빌드 환경 민감성이 매 배포마다 발동) | 게이트·토큰·smoke 전면 재작업 |
| 규범 적합 | 팔레트 예외 축 편입 = 정본 관례 그대로 | 도구가 남의 집에 사는 형태 — "노뮤트로 이식" 지시 취지 미달 | README 권고와는 부합하나 "지금 이식" 시급성과 충돌 | 3조 2항(기존 디자인 계승)과 정면 충돌 — 재색칠 영구 금지 조항 위반 |
| 7분 컷 | **가능(실증)** | 불가 | 불가 | 불가 |

### 6-3. 논증 요지
- **B안 탈락**: "이식"의 사전적 요구(코드가 노뮤트로 옮겨 옴)를 충족하지 못한다. 결정적으로 예울마루 playground 경로는 라이브 서빙 대상이 아니어서 임베드할 원격 URL 자체가 없다 — 만들려면 예울마루 배포 구조를 건드려야 하고, 그 순간 "노뮤트 이식" 지시가 "예울마루 개편"으로 변질된다.
- **C안 탈락(현시점)**: 방향 자체는 원본 README의 이상론(소스 기반 워크플로)과 일치하나, ① Pages 빌드 커맨드 신설 = 기존 전 표면의 배포 경로에 신규 실패 지점 주입 ② 빌드 환경 민감성(README가 명시 경고)이 배포마다 발동 ③ 7분 컷 불가. **단, C안의 정신(산출물 재생성 가능성)은 A안 위에서 P1-3(러너 검증)으로 이미 흡수**했다 — A안은 C안으로 가는 길을 막지 않는다(소스가 전부 함께 이식됐으므로 언제든 전환 가능).
- **D안 탈락**: 최다 비용 + 규범 정면 위반(독립 툴톤 재색칠 영구 금지 · 임의 창작 금지). 논외.
- **A안 채택 근거의 뼈대**: ① 원본 설계 의도가 통폴더 이동("통째로 옮겨도 그대로 빌드" — 원작자 명시) ② 수용처 관례가 독립 표면 병렬 구조(스튜디오 문법)라 꽂기만 하면 됨 ③ 변형 0 = 검증 부담 0(게이트가 기계적으로 증명) ④ 이후 어떤 후속안(C 전환·계정 축·카드 연동)으로도 확장 가능한 **무손실 출발점**.
- **효율의 정의를 명시**하면: 효율 = (지시 충족도 × 미래 확장성) / (소요 시간 × 신규 리스크). A안은 분자 손실 없이 분모를 최소화한 유일안이다. 검증단은 이 논증(특히 "C안을 지금 안 한 것"과 "B안 전제 미성립 판정")을 우선 공격하라.

## 8. 검증 계획 (이 보고서 자체의 적대 검증)

- 구성: **페이블5 검증단 5인 병렬**(운영자 실지시 — [E10] 기본값 OPUS 8인을 이 건에 한해 대체) · READ-ONLY(분석·판정만, 레포 변경 금지 = 평의회 규약 계승) · **6분 캡**(런 시작 기준 · 미회수분은 캡 시점까지 수렴).
- 관점 분배(적대 다양성 — 같은 걸 5번 보는 중복 배제):
  1. **범위·누락 감사**: 5장 갭 리스트에 빠진 반영 항목이 있는가(특히 수용처 규범 문서 대조).
  2. **대안 논증 공격**: 6장 비교 — B안 전제 미성립 판정과 C안 후순위 판정이 반박 가능한가.
  3. **리스크·안전 감사**: 7장 레지스터 외의 실패 모드(보안·저작권·데이터 유실·전파 장치 오발) 존재 여부.
  4. **실행 순서·공수 감사**: P0→P3 순서가 최적인가(특히 P2-1→P1-1 선후 결정), 공수 추정이 현실적인가.
  5. **규범 정합 감사**: 이번 이식과 이 계획이 기틀 조문·[0]~[14]·양 레포 바인딩과 충돌하는 지점이 있는가.
- 판정 양식(각 위원): {효율성 판정: 최적/보완 필요/재설계 · 근거 3줄 · 발견 결함 목록(심각도) · 개선 제안 상위 3}.
- 수렴 규칙: 과반(3+)이 '최적' = 계획 확정. '보완 필요' 과반 = 지적 반영해 본 문서 v2 개정 후 재보고. '재설계' 1표라도 근거가 실측 기반이면 운영자에게 분기 보고.
- 검증 결과는 채팅 최종 보고 ④에 표로 첨부한다(본 문서는 v1 그대로 두고, 반영 필요 시 v2 파일 신설 — [12] 버전 규칙).

### 9-2. 용어 풀이 (쉬운 말 대조표)
- **이식**: 화분(예울마루 실험 구역)에 잘 자란 나무를 정원(노뮤트 도구 허브)에 옮겨 심는 것. 이번엔 뿌리(소스)·흙(데이터)·화분 설명서(README)까지 통째로 옮겼다.
- **자기완결형 오프라인 앱**: 파일 하나만 있으면 인터넷 없이도 다 되는 앱. 폰트·강의 자막·교재가 전부 그 파일 안에 있다.
- **게이트**: 커밋 전에 기계가 돌리는 자동 검문소. 31개 검문을 전부 통과했다는 건 "기존 것 아무것도 안 건드렸다"를 기계가 보증한다는 뜻.
- **정본(SSOT)**: 여러 사본 중 "진짜"로 인정되는 단 하나. 지금은 두 레포에 같은 게 있어서, 어느 쪽을 진짜로 삼을지 정하는 게 P2-1.
- **계정 축**: 저장한 걸 "이 기기"가 아니라 "내 계정"에 묶는 것. 폰에서 저장하면 PC에서도 보이게 하는 배선.
- **드리프트**: 사본 두 개가 각자 조금씩 고쳐져서 서로 달라지는 병. 예방약 = 정본 선언.
- **no-cache 계약**: "이 페이지는 열 때마다 새 버전인지 확인해"라는 규칙. 새로 배포했는데 옛날 화면이 보이는 사고를 막는다.
